// Called after every ESPN fetch. Mutates STANDINGS_DATA, STREAK_DATA,
// _RECENT_RESULTS, ENRICHED_DATA in-place so all render functions
// see fresh data without a page reload.
//
// KEY INVARIANT: Only games that are truly NEW (not already counted
// in STANDINGS_DATA baseline or a previous poll cycle) affect W/L totals.
// Streaks for a team are only updated when that team has a genuinely new
// final game · never recomputed from a partial game list.

// Persistent set of game keys already applied to STANDINGS_DATA.
// Pre-seeded with all RECENT_GAMES so they are never double-counted.
const _appliedGameKeys = new Set(
  RECENT_GAMES.map(g => g.date + '_' + g.home + '_' + g.away)
);

function applyLiveGameData(allFinalGames) {
  if (!allFinalGames || !allFinalGames.length) return;

  const sorted = [...allFinalGames].sort((a, b) => (a.date||'').localeCompare(b.date||''));

  // 1. Filter to genuinely new games not yet applied to W/L totals.
  const newGames = sorted.filter(g => {
    const key = g.date + '_' + g.home + '_' + g.away;
    if (_appliedGameKeys.has(key)) return false;
    _appliedGameKeys.add(key);
    return true;
  });

  // 2. Apply only new game results to wins/losses · never re-apply old ones.
  if (newGames.length) {
    const wMap = {}, lMap = {};
    STANDINGS_DATA.forEach(t => { wMap[t.abbr] = t.wins; lMap[t.abbr] = t.losses; });
    newGames.forEach(g => {
      const hw = g.homeScore > g.awayScore;
      if (wMap[g.home] !== undefined) { hw ? wMap[g.home]++ : lMap[g.home]++; }
      if (wMap[g.away] !== undefined) { hw ? lMap[g.away]++ : wMap[g.away]++; }
    });
    STANDINGS_DATA.forEach(t => { t.wins = wMap[t.abbr]; t.losses = lMap[t.abbr]; });
  }

  // 3. Update last-game map · newest game per team wins.
  sorted.forEach(g => { _lastGameMap[g.home] = g; _lastGameMap[g.away] = g; });

  // Note: streaks are NOT updated here · fetchESPNStreaks() computes them from
  // actual game results and runs immediately after in pollAndRefreshAll.
  // Incrementing on top of a potentially stale baseline caused wrong values.

  // 4. Rebuild _RECENT_RESULTS from last 20 applied games across all fetched data.
  const recent20 = sorted.slice(-20);
  STANDINGS_DATA.forEach(t => { _RECENT_RESULTS[t.abbr] = { recentWins: 0, recentLosses: 0, opponents: [] }; });
  recent20.forEach(g => {
    const hw = g.homeScore > g.awayScore;
    if (_RECENT_RESULTS[g.home]) {
      hw ? _RECENT_RESULTS[g.home].recentWins++ : _RECENT_RESULTS[g.home].recentLosses++;
      _RECENT_RESULTS[g.home].opponents.push(g.away);
    }
    if (_RECENT_RESULTS[g.away]) {
      hw ? _RECENT_RESULTS[g.away].recentLosses++ : _RECENT_RESULTS[g.away].recentWins++;
      _RECENT_RESULTS[g.away].opponents.push(g.home);
    }
  });

  // 6. Recompute ENRICHED_DATA in-place (only needed when something actually changed).
  if (newGames.length) {
    ENRICHED_DATA.forEach((entry, i) => {
      const s = STANDINGS_DATA[i];
      Object.assign(entry, s, computePowerScore(s), { streak: STREAK_DATA[s.abbr] || 0 });
    });

    // 7. Update streak extremes for badge coloring.
    const vals = Object.values(STREAK_DATA);
    _streakBest  = Math.max(...vals);
    _streakWorst = Math.min(...vals);
  }
}

// ── POLL LOOP ────────────────────────────────────────────────
// 60s when live games running, 5min otherwise.
// Refreshes all tabs with live data after each fetch.
let _pollTimer = null;
let _hasLiveGames = false;
let _lastScoreData = null;    // cached so GTW badges can be refreshed without re-fetching

async function pollAndRefreshAll() {
  const today = localDateStr(new Date());
  const past3  = getDateRange(3, 0).slice(0, 3);
  const results = await Promise.all([espnFetchDate(today), ...past3.map(d => espnFetchDate(d))]);
  const todayGames = results[0] || [];
  const allFinal   = [...todayGames, ...results.slice(1).flatMap(r => r || [])].filter(g => g.isFinal);

  _hasLiveGames = todayGames.some(g => g.isLive);

  // Always re-fetch net ratings on every poll so oRTG/dRTG/netRtg stay current
  // even on days with no new game results finishing.
  fetchLiveNetRatings();

  // Determine if any genuinely new finals exist before mutating state.
  const newFinalsExist = allFinal.some(g => {
    const key = g.date + '_' + g.home + '_' + g.away;
    return !_appliedGameKeys.has(key);
  });

  if (newFinalsExist) {
    applyLiveGameData(allFinal);
  }

  // Only re-render rankings/other tabs when something actually changed.
  // This prevents power scores and rankings from flickering mid-game.
  if (!newFinalsExist) {
    schedulePoll();
    return;
  }

  // Re-fetch streaks after new games finish
  fetchESPNStreaks();

  renderRankings();


  // Re-render other tabs only if visible (avoids resetting bracket picks)
  if (document.getElementById('panel-playoffs') && document.getElementById('panel-playoffs').classList.contains('active')) renderPlayoffs();
  if (document.getElementById('panel-simulations') && document.getElementById('panel-simulations').classList.contains('active')) _simShowTab(_simActiveSubtab);

  // Auto-grade any pending predictions now that new games have finished
  _predAutoGrade();

  // Timestamp
  const now = new Date();
  const el = document.getElementById('update-time');
  if (el) el.textContent = 'Updated ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

  schedulePoll();
}

function schedulePoll() {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = setTimeout(pollAndRefreshAll, _hasLiveGames ? 60000 : 300000);
}

// Standalone ratings refresh — runs every 30 minutes regardless of game activity.
// Ensures oRTG, dRTG, and net rating stay current even on off-days or between polls.
// fetchLiveNetRatings() already calls renderRankings() internally when data changes.
setInterval(function() { fetchLiveNetRatings(); }, 10 * 60 * 1000);

const SORT_COLUMNS = [
  { key: 'power',    label: 'Power Score', center: false },
  { key: 'record',   label: 'Record',      center: false },
  { key: 'winPct',   label: 'Win%',        center: true  },
  { key: 'netRtg',   label: 'Net Rtg',     center: true  },
  { key: 'ortg',     label: 'oRtg',        center: true  },
  { key: 'drtg',     label: 'dRtg',        center: true  },
  { key: 'streak',   label: 'Streak',      center: true  },
];

function sortRankings(key) {
  if (rankingsSortKey === key) {
    rankingsSortDir = rankingsSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    rankingsSortKey = key;
    rankingsSortDir = (key === 'drtg' || key === 'name') ? 'asc' : 'desc';
  }
  renderRankings();
}

function setRankingsView(view, btn) {
  rankingsView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRankings();
}

function getSortValue(t, key) {
  switch(key) {
    case 'power':    return t.power;
    case 'name':     return t.name.toLowerCase();
    case 'record':   return t.winPct;
    case 'winPct':   return t.winPct;
    case 'netRtg':   return t.netRtg;
    case 'ortg':     return t.ortg;
    case 'drtg':     return t.drtg;
    case 'streak':   return t.streak;
    default:         return 0;
  }
}

// ============================================================
// RANK MOVEMENT · baseline is the most recent weekly snapshot
// ============================================================
function buildBaselineRankMap() {
  // Always use the last entry in WEEKLY_RANKINGS as the week's starting point.
  // When the auto-inject fires (7+ days elapsed), the newly appended snapshot
  // becomes the new baseline automatically on the next call.
  const last = WEEKLY_RANKINGS[WEEKLY_RANKINGS.length - 1];
  const map = {};
  if (last && last.rankings) {
    last.rankings.forEach(function(e) { map[e.team] = e.rank; });
  }
  return map;
}

function buildCurrentRankMap() {
  // Compute live ranks from current ENRICHED_DATA power scores
  const sorted = [...ENRICHED_DATA].sort(function(a, b) { return b.power - a.power; });
  const map = {};
  sorted.forEach(function(t, i) { map[t.abbr] = i + 1; });
  return map;
}

function getRankMovement(abbr, baselineMap, currentMap) {
  const base = baselineMap[abbr];
  const curr = currentMap[abbr];
  if (!base || !curr) return 0;
  return base - curr; // positive = moved up (lower rank number = better)
}

function rankMoveCell(movement) {
  if (movement > 0) {
    return '<td class="rank-move-cell"><div class="rank-move up"><span class="rank-move-arrow">▲</span><span class="rank-move-num">' + movement + '</span></div></td>';
  } else if (movement < 0) {
    return '<td class="rank-move-cell"><div class="rank-move down"><span class="rank-move-arrow">▼</span><span class="rank-move-num">' + Math.abs(movement) + '</span></div></td>';
  }
  return '<td class="rank-move-cell"></td>';
}

function renderRankings() {
  const baselineRankMap = buildBaselineRankMap();
  const currentRankMap  = buildCurrentRankMap();
  const allPowers = ENRICHED_DATA.map(t => t.power);
  const maxP = Math.max(...allPowers);
  const minP = Math.min(...allPowers);

  function thSortable(key, label, isCenter) {
    const isActive = rankingsSortKey === key;
    const arrow = isActive ? (rankingsSortDir === 'desc' ? '\u25BC' : '\u25B2') : '\u25BC';
    const cls = 'sortable' + (isActive ? ' sort-active' : '') + (isCenter ? ' center' : '');
    return `<th class="${cls}" onclick="sortRankings('${key}')">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  function tableHead() {
    return `<table class="rankings-table">
      <thead><tr>
        <th class="center">#</th>
        <th style="width:28px;min-width:28px;padding:0"></th>
        <th class="sortable${rankingsSortKey==='name'?' sort-active':''}" onclick="sortRankings('name')">Team<span class="sort-arrow">${rankingsSortKey==='name'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        ${thSortable('power','Power Score',false)}
        <th class="bar-cell col-bar"></th>
        <th class="col-record sortable${rankingsSortKey==='record'?' sort-active':''}" onclick="sortRankings('record')">Record<span class="sort-arrow">${rankingsSortKey==='record'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        <th class="col-winpct center sortable${rankingsSortKey==='winPct'?' sort-active':''}" onclick="sortRankings('winPct')">Win%<span class="sort-arrow">${rankingsSortKey==='winPct'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        <th class="col-netrtg center sortable${rankingsSortKey==='netRtg'?' sort-active':''}" onclick="sortRankings('netRtg')">Net Rtg<span class="sort-arrow">${rankingsSortKey==='netRtg'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        <th class="col-ortg center sortable${rankingsSortKey==='ortg'?' sort-active':''}" onclick="sortRankings('ortg')">oRtg<span class="sort-arrow">${rankingsSortKey==='ortg'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        <th class="col-drtg center sortable${rankingsSortKey==='drtg'?' sort-active':''}" onclick="sortRankings('drtg')">dRtg<span class="sort-arrow">${rankingsSortKey==='drtg'?(rankingsSortDir==='desc'?'\u25BC':'\u25B2'):'\u25BC'}</span></th>
        ${thSortable('streak','Streak',true)}
        <th class="last-cell col-last" style="color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;padding:10px 14px;font-weight:600">Last</th>
      </tr></thead><tbody>`;
  }

  function teamRow(t, rank, isTop3, movement) {
    const fillColor = getPowerColor(t.power, minP, maxP);
    const fillPct = ((t.power - minP) / (maxP - minP) * 100).toFixed(1);
    const streakClass = getStreakClass(t.streak);
    const streakLabel = getStreakLabel(t.streak);
    const colors = TEAM_COLORS[t.abbr] || { bg: 'var(--surface2)', text: 'var(--text)' };
    const logo = getLogoUrl(t.abbr);

    // Build Last Game cell
    const lg = _lastGameMap[t.abbr] || null;
    let lastCell = `<td class="last-cell col-last"><span class="last-none">-</span></td>`;
    if (lg) {
      const isHome  = lg.home === t.abbr;
      const myScore = isHome ? lg.homeScore : lg.awayScore;
      const opScore = isHome ? lg.awayScore  : lg.homeScore;
      const oppAbbr = isHome ? lg.away : lg.home;
      const won     = myScore > opScore;
      const atVs    = isHome ? 'vs' : '@';
      const oppLogo = getLogoUrl(oppAbbr);
      // Get day of week from game date
      let dayLabel = '';
      if (lg.date) {
        const gameDate = new Date(lg.date + 'T12:00:00');
        dayLabel = gameDate.toLocaleDateString('en-US', { weekday: 'short' });
      }
      lastCell = `<td class="last-cell col-last">
        <span class="last-result">
          <span class="last-wl ${won?'win':'loss'}">${won?'W':'L'}</span>
          <span class="last-score">${myScore}–${opScore}</span>
          <span class="last-at">${atVs}</span>
          <img class="last-opp-logo" src="${oppLogo}" alt="${oppAbbr}" onerror="this.style.display='none'">
          <span class="last-opp-abbr">${oppAbbr}${dayLabel ? ` <span style="color:var(--muted);font-size:0.72rem">(${dayLabel})</span>` : ''}</span>
        </span>
      </td>`;
    }

    return `<tr>
      <td><div class="rank-num ${isTop3?'top3':''}">${rank}</div></td>
      ${rankMoveCell(movement)}
      <td>
        <div class="team-cell">
          <div style="width:36px;height:28px;border-radius:5px;background:${colors.bg};border:1px solid ${colors.bg}88;display:flex;align-items:center;justify-content:center;padding:2px 3px;flex-shrink:0">
            <img src="${logo}" alt="${t.abbr}" style="width:100%;height:100%;object-fit:contain" onerror="this.outerHTML='<span style=font-family:Bebas Neue,sans-serif;font-size:0.75rem;color:${colors.text};padding:0 2px>${t.abbr}</span>'">
          </div>
          <div>
            <div class="team-name-full">${t.name}</div>
            <div class="team-conf">${t.conf} · ${t.div}</div>
          </div>
        </div>
      </td>
      <td><div class="power-score" style="color:${fillColor}">${t.power}</div></td>
      <td class="bar-cell col-bar">
        <div class="power-bar-bg">
          <div class="power-bar-fill" style="width:${fillPct}%; background:${fillColor}"></div>
        </div>
      </td>
      <td class="record-cell col-record">${t.wins}–${t.losses}</td>
      <td class="win-pct-cell center col-winpct">${(t.winPct*100).toFixed(1)}%</td>
      <td class="ortg-cell col-netrtg" style="color:${t.netRtg>0?'#00e87a':'#ff3355'}">${t.netRtg > 0 ? '+' : ''}${t.netRtg}</td>
      <td class="ortg-cell col-ortg">${t.ortg}</td>
      <td class="ortg-cell col-drtg">${t.drtg}</td>
      <td><span class="trend-badge ${streakClass}">${streakLabel}</span></td>
      ${lastCell}
    </tr>`;
  }

  function sortTeams(teams) {
    return [...teams].sort((a, b) => {
      const va = getSortValue(a, rankingsSortKey);
      const vb = getSortValue(b, rankingsSortKey);
      const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
      return rankingsSortDir === 'desc' ? -cmp : cmp;
    });
  }

  let html = '';

  if (rankingsView === 'league') {
    const sorted = sortTeams(ENRICHED_DATA);
    html = tableHead();
    sorted.forEach((t, i) => { html += teamRow(t, i + 1, i < 3, getRankMovement(t.abbr, baselineRankMap, currentRankMap)); });
    html += `</tbody></table>`;

  } else if (rankingsView === 'conference') {
    ['WEST', 'EAST'].forEach(conf => {
      const label = conf === 'WEST' ? 'Western Conference' : 'Eastern Conference';
      const cls = conf === 'WEST' ? 'west' : 'east';
      const teams = sortTeams(ENRICHED_DATA.filter(t => t.conf === conf));
      html += `<div class="rankings-group-header ${cls}">${label}</div>`;
      html += tableHead();
      teams.forEach((t, i) => { html += teamRow(t, i + 1, i < 3, getRankMovement(t.abbr, baselineRankMap, currentRankMap)); });
      html += `</tbody></table>`;
    });

  } else if (rankingsView === 'division') {
    const DIVISIONS = [
      { name: 'Northwest', conf: 'WEST' }, { name: 'Pacific', conf: 'WEST' }, { name: 'Southwest', conf: 'WEST' },
      { name: 'Atlantic', conf: 'EAST' }, { name: 'Central', conf: 'EAST' }, { name: 'Southeast', conf: 'EAST' },
    ];
    DIVISIONS.forEach(div => {
      const teams = sortTeams(ENRICHED_DATA.filter(t => t.div === div.name));
      if (!teams.length) return;
      const confLabel = div.conf === 'WEST' ? 'Western' : 'Eastern';
      html += `<div class="rankings-group-header div">${div.name} Division <span style="font-size:0.7rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;margin-left:8px">${confLabel}</span></div>`;
      html += tableHead();
      teams.forEach((t, i) => { html += teamRow(t, i + 1, i === 0, getRankMovement(t.abbr, baselineRankMap, currentRankMap)); });
      html += `</tbody></table>`;
    });
  }

  document.getElementById('rankings-container').innerHTML = html;
}

// ============================================================
// LIVE NBA DATA · ESPN API (free, CORS-friendly, no key needed)
// Auto-refreshes: data fetched fresh on every page load.
// ============================================================

const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';

// Normalize ESPN team abbreviations → our internal abbrs
const ABBR_MAP = {
  'ATL':'ATL','BKN':'BKN','BOS':'BOS','CHA':'CHA','CHI':'CHI',
  'CLE':'CLE','DAL':'DAL','DEN':'DEN','DET':'DET','GSW':'GSW',
  'HOU':'HOU','IND':'IND','LAC':'LAC','LAL':'LAL','MEM':'MEM',
  'MIA':'MIA','MIL':'MIL','MIN':'MIN','NOP':'NOP','NYK':'NYK',
  'OKC':'OKC','ORL':'ORL','PHI':'PHI','PHX':'PHX','POR':'POR',
  'SAC':'SAC','SAS':'SAS','TOR':'TOR','UTA':'UTA','WAS':'WAS',
  'GS':'GSW','SA':'SAS','NY':'NYK','NO':'NOP','PHO':'PHX',
  'UTAH':'UTA','WSH':'WAS','BRK':'BKN','NOR':'NOP'
};
function normAbbr(a) { return ABBR_MAP[a] || a; }

// Build a power-rank map (rank 1 = best) for "Games to Watch" logic
function buildPowerRankMap() {
  const ranked = STANDINGS_DATA
    .map(t => ({ abbr: t.abbr, power: computePowerScore(t).power }))
    .sort((a, b) => b.power - a.power);
  const map = {};
  ranked.forEach((t, i) => { map[t.abbr] = i + 1; });
  return map;
}

// Format a date as YYYY-MM-DD in local time
function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// Returns array of YYYY-MM-DD strings for today + past N days + future N days
function getDateRange(pastDays, futureDays) {
  const dates = [];
  for (let i = -pastDays; i <= futureDays; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    dates.push(localDateStr(d));
  }
  return dates;
}

// Fetch games from ESPN for a given date (YYYY-MM-DD)
async function espnFetchDate(dateStr) {
  try {
    const yyyymmdd = dateStr.replace(/-/g, '');
    const url = `${ESPN_BASE}?dates=${yyyymmdd}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`ESPN ${res.status}`);
    const json = await res.json();
    return parseESPNGames(json, dateStr);
  } catch (e) {
    return null; // signal failure
  }
}

function parseESPNGames(data, dateStr) {
  const events = data?.events || [];
  return events.map(evt => {
    const comp = evt.competitions?.[0];
    if (!comp) return null;
    const homeComp = comp.competitors?.find(c => c.homeAway === 'home');
    const awayComp = comp.competitors?.find(c => c.homeAway === 'away');
    const home = normAbbr(homeComp?.team?.abbreviation || '');
    const away = normAbbr(awayComp?.team?.abbreviation || '');
    const homeScore = +(homeComp?.score || 0);
    const awayScore = +(awayComp?.score || 0);
    const statusType = comp.status?.type;
    const isFinal = statusType?.completed === true;
    const isLive = !isFinal && (statusType?.state === 'in');
    const isUpcoming = !isFinal && !isLive;
    const statusText = statusType?.shortDetail || comp.status?.type?.detail || '';
    let tipDisplay = '';
    if (isUpcoming && statusText) {
      // Extract time from status text like "3/27 - 7:00 PM ET" or "7:00 PM ET"
      const timeMatch = statusText.match(/(\d{1,2}:\d{2}\s*[AP]M)/i);
      tipDisplay = timeMatch ? timeMatch[1].toUpperCase() : statusText.replace(/ ET$/,'').toUpperCase();
    }
    const status = isLive ? statusText : (isFinal ? 'Final' : statusText);
    // Extract moneylines from ESPN odds data
    const oddsData = comp.odds && comp.odds[0];
    const homeML = oddsData?.homeTeamOdds?.moneyLine || oddsData?.homeTeamOdds?.current?.moneyLine || null;
    const awayML = oddsData?.awayTeamOdds?.moneyLine || oddsData?.awayTeamOdds?.current?.moneyLine || null;
    const eventId = evt.id || null;
    return { home, away, homeScore, awayScore, date: dateStr, tipDisplay, isFinal, isLive, isUpcoming, status, homeML, awayML, eventId };
  }).filter(Boolean);
}

// Compute win probability for upcoming game display
function gameWinProb(awayAbbr, homeAbbr) {
  const awayT = STANDINGS_DATA.find(t => t.abbr === awayAbbr);
  const homeT = STANDINGS_DATA.find(t => t.abbr === homeAbbr);
  if (!awayT || !homeT) return { homePct: 55, awayPct: 45 };
  const awayPwr = computePowerScore(awayT).power;
  const homePwr = computePowerScore(homeT).power;
  const diff = (homePwr - awayPwr) * 0.4 + 2.0; // home court ~2pts
  const homeProb = 1 / (1 + Math.exp(-diff * 0.15));
  const homePct = Math.round(Math.max(28, Math.min(75, homeProb * 100)));
  return { homePct, awayPct: 100 - homePct };
}

// Get all remaining regular season game dates from the ESPN calendar
function getRemainingSeasonDates() {
  const today = new Date();
  const dates = [];
  // Regular season typically ends around April 13; generate dates through Apr 15 to be safe
  const endDate = new Date(today.getFullYear(), 3, 15); // April 15
  const d = new Date(today);
  d.setDate(d.getDate() + 1); // start from tomorrow
  while (d <= endDate) {
    dates.push(localDateStr(new Date(d)));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

// Fetch the full remaining schedule for Games to Watch
async function fetchRemainingSchedule() {
  const dates = getRemainingSeasonDates();
  // Fetch all remaining dates in parallel (batched)
  const results = await Promise.all(dates.map(d => espnFetchDate(d)));
  const allGames = [];
  results.forEach((games, i) => {
    if (games && games.length > 0) {
      games.forEach(g => {
        if (g.isUpcoming || g.isFinal === false) {
          allGames.push({ ...g, date: dates[i] });
        }
      });
    }
  });
  return allGames;
}

// Main scores fetch · pulls today + 3 past days from ESPN, plus full remaining schedule
async function fetchAllScoreData() {
  const today = localDateStr(new Date());
  const past3 = getDateRange(3, 0).slice(0, 3); // 3 days ago through yesterday

  // Run fetches in parallel: today + past 3 days
  const dateResults = await Promise.all([
    espnFetchDate(today),
    ...past3.map(d => espnFetchDate(d))
  ]);

  let todayGames = dateResults[0];
  const pastResults = dateResults.slice(1);

  // Flatten past games · only finals
  let recentGames = pastResults
    .flatMap(games => (games || []))
    .filter(g => g.isFinal)
    .sort((a, b) => b.date.localeCompare(a.date)); // newest first

  // Fetch full remaining schedule for Games to Watch
  let remainingGames = [];
  try {
    remainingGames = await fetchRemainingSchedule();
  } catch (e) { /* will use fallback */ }

  // Determine data source
  const apiWorked = todayGames !== null || pastResults.some(r => r !== null);
  let source = apiWorked ? 'espn' : 'fallback';

  // Fallback: if APIs failed, use hardcoded data
  if (!todayGames || todayGames.length === 0) {
    // Use UPCOMING_GAMES that match today's date as today's games
    const todayStr = today;
    const todayFromUpcoming = UPCOMING_GAMES
      .filter(g => g.date === todayStr)
      .map(g => ({ ...g, isUpcoming: true, isFinal: false, isLive: false, tipDisplay: g.tipDisplay || '' }));
    if (todayFromUpcoming.length > 0) {
      todayGames = todayFromUpcoming;
    } else {
      todayGames = [];
    }
  }

  if (!apiWorked && recentGames.length === 0) {
    recentGames = RECENT_GAMES.map(g => ({
      ...g, isFinal: g.status === 'final', isLive: false, isUpcoming: false, tipDisplay: ''
    }));
  }

  if (remainingGames.length === 0) {
    // Use any UPCOMING_GAMES that are after today as fallback
    const todayStr = today;
    remainingGames = UPCOMING_GAMES
      .filter(g => g.date > todayStr)
      .map(g => ({ ...g, isUpcoming: true, isFinal: false, isLive: false, tipDisplay: g.tipDisplay || '' }));
  }

  return {
    today: todayGames || [],
    recent: recentGames,
    remaining: remainingGames,
    source,
    fetchedAt: new Date()
  };
}

// ── SCORE ENGINE INIT ─────────────────────────────────────────
// Replaces renderScores() — fetches today's game data, applies finished games to
// live rankings engine, starts the background poll loop. No scores tab needed.
async function _initScoreEngine() {
  let data;
  try { data = await fetchAllScoreData(); }
  catch(e) { data = { today: [], recent: [], remaining: [], source: 'error', fetchedAt: new Date() }; }

  _lastScoreData = data;

  const finishedGames = [...(data.today || []), ...(data.recent || [])].filter(g => g.isFinal);
  const hasNewFinals = finishedGames.some(g => {
    const key = g.date + '_' + g.home + '_' + g.away;
    return !_appliedGameKeys.has(key);
  });
  if (hasNewFinals) applyLiveGameData(finishedGames);
  renderRankings();

  _hasLiveGames = (data.today || []).some(g => g.isLive);
  schedulePoll();
}

// Division winners map (best record in each division)
function getDivisionWinners() {
  const divs = {};
  STANDINGS_DATA.forEach(t => {
    const key = t.conf + '_' + t.div;
    if (!divs[key] || t.wins / (t.wins + t.losses) > divs[key].wins / (divs[key].wins + divs[key].losses)) {
      divs[key] = t;
    }
  });
  return new Set(Object.values(divs).map(t => t.abbr));
}

function getConfWinPct(team) {
  const seed = team.abbr.charCodeAt(0) * 3 + team.abbr.charCodeAt(1) * 7 + team.abbr.charCodeAt(2);
  const base = team.wins / (team.wins + team.losses);
  return base + ((seed % 11) - 5) * 0.004;
}

function getDivWinPct(team) {
  const seed = team.abbr.charCodeAt(0) * 5 + team.abbr.charCodeAt(2) * 3;
  const base = team.wins / (team.wins + team.losses);
  return base + ((seed % 9) - 4) * 0.006;
}

function getPointDiff(team) {
  const netRtg = computePowerScore(team).netRtg;
  return Math.round(netRtg * (team.wins + team.losses) * 0.5);
}

function seedConference(conf) {
  const teams = STANDINGS_DATA.filter(t => t.conf === conf).map(t => ({
    ...t,
    winPct: t.wins / (t.wins + t.losses),
    confWinPct: getConfWinPct(t),
    divWinPct: getDivWinPct(t),
    ptDiff: getPointDiff(t),
  }));
  const divWinners = getDivisionWinners();
  teams.sort((a, b) => {
    if (Math.abs(a.winPct - b.winPct) > 0.0001) return b.winPct - a.winPct;
    const aDiv = divWinners.has(a.abbr) ? 1 : 0;
    const bDiv = divWinners.has(b.abbr) ? 1 : 0;
    if (aDiv !== bDiv) return bDiv - aDiv;
    if (Math.abs(a.confWinPct - b.confWinPct) > 0.0001) return b.confWinPct - a.confWinPct;
    if (a.div === b.div && Math.abs(a.divWinPct - b.divWinPct) > 0.0001) return b.divWinPct - a.divWinPct;
    return b.ptDiff - a.ptDiff;
  });
  return teams;
}

function renderPlayoffs() {
  const west = seedConference('WEST');
  const east = seedConference('EAST');

  // ================================================================
  // BRACKET STATE
  // ================================================================
  // Each conf: 4 R1 matchups, 2 Semis, 1 CF, 1 Finals slot
  // bracket[conf][round][matchupIdx] = winning team object or null
  // play-in: piWinners[conf] = { seed7: team|null, seed8: team|null }
  const bracketState = {
    west: { r1: [null,null,null,null], semi: [null,null], cf: [null], finalsTeam: null },
    east: { r1: [null,null,null,null], semi: [null,null], cf: [null], finalsTeam: null },
    champion: null
  };
  const piState = {
    west: { game78winner: null, game910winner: null, seed8: null, deciderWinner: null },
    east: { game78winner: null, game910winner: null, seed8: null, deciderWinner: null }
  };

  // R1 pairings: [topSeedIdx, botSeedIdx] into the seeded array (0-based)
  // 1v8, 4v5, 3v6, 2v7 · indices 0,1,2,3,4,5 for seeds 1-6; 6,7 for play-in results
  const R1_PAIRINGS = [[0,7],[3,4],[2,5],[1,6]]; // [topSeedIdx, botSeedIdx]

  // History stack for undo
  const history = [];
  const redoStack = [];

  function pushHistory(action) {
    history.push(JSON.parse(JSON.stringify({ bracketState, piState, action })));
    redoStack.length = 0; // clear redo on new action
    updateControls();
  }

  function undo() {
    if (!history.length) return;
    const current = JSON.parse(JSON.stringify({ bracketState, piState }));
    redoStack.push(current);
    const prev = history.pop();
    Object.assign(bracketState, prev.bracketState);
    Object.assign(piState, prev.piState);
    updateControls();
    rerenderBracket();
  }

  function redo() {
    if (!redoStack.length) return;
    const next = redoStack.pop();
    history.push(JSON.parse(JSON.stringify({ bracketState, piState })));
    Object.assign(bracketState, next.bracketState);
    Object.assign(piState, next.piState);
    updateControls();
    rerenderBracket();
  }

  function clearBracket() {
    // Reset all picks
    ['west','east'].forEach(c => {
      bracketState[c].r1 = [null,null,null,null];
      bracketState[c].semi = [null,null];
      bracketState[c].cf = [null];
      bracketState[c].finalsTeam = null;
      piState[c].game78winner = null;
      piState[c].game910winner = null;
      piState[c].seed8 = null;
      piState[c].deciderWinner = null;
    });
    bracketState.champion = null;
    history.length = 0;
    redoStack.length = 0;
    updateControls();
    rerenderBracket();
    dismissChampion();
  }

  function updateControls() {
    const undoBtn = document.getElementById('bkt-undo-btn');
    const redoBtn = document.getElementById('bkt-redo-btn');
    const clearBtn = document.getElementById('bkt-clear-btn');
    if (undoBtn) undoBtn.disabled = history.length === 0;
    if (redoBtn) redoBtn.disabled = redoStack.length === 0;
    if (clearBtn) {
      const hasAny = bracketState.champion ||
        ['west','east'].some(c => bracketState[c].r1.some(x=>x) || bracketState[c].semi.some(x=>x) || bracketState[c].cf[0] || piState[c].game78winner || piState[c].game910winner);
      clearBtn.disabled = !hasAny;
    }
  }

  // ================================================================
  // PLAY-IN LOGIC
  // ================================================================
  const wPI = west.slice(6, 10);
  const ePI = east.slice(6, 10);

  // Placeholder objects for undecided 7/8 seeds · used in the bracket before play-in picks are made.
  // These are lightweight sentinels; bracket picks stored against them get replaced when the real
  // team is resolved, or cleared if the user's choice doesn't match the resolved seed.
  function makePlaceholder(seed, conf) {
    return { _placeholder: true, _seed: seed, _conf: conf, abbr: '__PI' + seed + '_' + conf,
             name: 'Play-In #' + seed, wins: 0, losses: 0 };
  }

  // Returns the 8th seed from play-in for a conf (real team or placeholder)
  function getSeed8(conf) {
    return piState[conf].seed8 || makePlaceholder(8, conf);
  }
  function getSeed7(conf) {
    return piState[conf].game78winner || makePlaceholder(7, conf);
  }

  // When a real team is resolved for a play-in slot, walk the bracket and replace
  // any stored placeholder of that seed with the real team.  If the stored pick
  // was the OTHER placeholder (wrong seed), leave it · it will get cleared by
  // invalidatePlayInDownstream.
  function replacePlaceholderInBracket(conf, seedNum, realTeam) {
    const phAbbr = '__PI' + seedNum + '_' + conf;
    // Check every stored bracket pick and swap in the real team
    ['r1','semi','cf'].forEach(round => {
      const arr = bracketState[conf][round];
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] && arr[i].abbr === phAbbr) arr[i] = realTeam;
      }
    });
    if (bracketState[conf].finalsTeam && bracketState[conf].finalsTeam.abbr === phAbbr) {
      bracketState[conf].finalsTeam = realTeam;
    }
    if (bracketState.champion && bracketState.champion.abbr === phAbbr) {
      bracketState.champion = realTeam;
    }
  }

  function pickPlayIn(conf, game, teamIdx) {
    pushHistory('playin');
    const piTeams = conf === 'west' ? wPI : ePI;
    if (game === '78') {
      const newSeed7 = piTeams[teamIdx];
      piState[conf].game78winner = newSeed7;
      // Replace any bracket placeholder for seed 7 with the real team
      replacePlaceholderInBracket(conf, 7, newSeed7);
      // Loser of 7/8 plays winner of 9/10 · reset 8 seed decider when 7/8 changes
      // Also clear bracket picks that used the seed-8 placeholder (they're now ambiguous)
      piState[conf].seed8 = null;
      piState[conf].deciderWinner = null;
      invalidatePlaceholderPicks(conf, 8);
    } else if (game === '910') {
      piState[conf].game910winner = piTeams[teamIdx + 2];
      // Reset the 8-seed decider pick since 9/10 winner changed
      piState[conf].seed8 = null;
      piState[conf].deciderWinner = null;
      invalidatePlaceholderPicks(conf, 8);
    } else if (game === 'decider') {
      // teamIdx: 0 = loser of 7/8, 1 = winner of 9/10
      const piState_c = piState[conf];
      const loserOf78 = piTeams.find(t => t !== piState_c.game78winner && (t === piTeams[0] || t === piTeams[1]));
      const newSeed8 = teamIdx === 0 ? loserOf78 : piState[conf].game910winner;
      piState[conf].seed8 = newSeed8;
      piState[conf].deciderWinner = newSeed8;
      // Replace any bracket placeholder for seed 8 with the real team
      replacePlaceholderInBracket(conf, 8, newSeed8);
    }
    rerenderBracket();
  }

  // Clear bracket picks that are stored as a specific placeholder (called when that
  // placeholder becomes ambiguous again, e.g. when the 7/8 game result changes).
  function invalidatePlaceholderPicks(conf, seedNum) {
    const phAbbr = '__PI' + seedNum + '_' + conf;
    // R1 matchups that use the 8-seed: idx 0 (1v8) · clear pick if it was the placeholder
    [0, 3].forEach(r1idx => {
      if (bracketState[conf].r1[r1idx] && bracketState[conf].r1[r1idx].abbr === phAbbr) {
        bracketState[conf].r1[r1idx] = null;
        invalidateDownstream(conf, 'r1', r1idx);
      }
    });
  }

  // ================================================================
  // BRACKET PICK LOGIC
  // ================================================================
  function getR1Teams(conf, matchupIdx) {
    const seeds = conf === 'west' ? west : east;
    const pairing = R1_PAIRINGS[matchupIdx];
    let topTeam = seeds[pairing[0]];
    let botTeam = seeds[pairing[1]];
    // Matchup 0: 1 vs 8-seed (play-in winner or placeholder)
    if (matchupIdx === 0) { botTeam = getSeed8(conf); }
    // Matchup 3: 2 vs 7-seed (play-in winner or placeholder)
    if (matchupIdx === 3) { botTeam = getSeed7(conf); }
    return [topTeam, botTeam];
  }

  function getSemiTeams(conf, matchupIdx) {
    // Semi 0: winner of R1[0] vs winner of R1[1]
    // Semi 1: winner of R1[2] vs winner of R1[3]
    if (matchupIdx === 0) return [bracketState[conf].r1[0], bracketState[conf].r1[1]];
    return [bracketState[conf].r1[2], bracketState[conf].r1[3]];
  }

  function getCFTeams(conf) {
    return [bracketState[conf].semi[0], bracketState[conf].semi[1]];
  }

  function getFinalsTeams() {
    return [bracketState.west.cf[0], bracketState.east.cf[0]];
  }

  function pickR1(conf, matchupIdx, team) {
    pushHistory('r1');
    bracketState[conf].r1[matchupIdx] = team;
    invalidateDownstream(conf, 'r1', matchupIdx);
    rerenderBracket();
  }

  function pickSemi(conf, matchupIdx, team) {
    pushHistory('semi');
    bracketState[conf].semi[matchupIdx] = team;
    invalidateDownstream(conf, 'semi', matchupIdx);
    rerenderBracket();
  }

  function pickCF(conf, team) {
    pushHistory('cf');
    bracketState[conf].cf[0] = team;
    bracketState[conf].finalsTeam = team;
    // invalidate finals pick if team changed
    if (bracketState.champion && bracketState.champion.abbr !== (bracketState.west.cf[0] && bracketState.west.cf[0].abbr) && bracketState.champion.abbr !== (bracketState.east.cf[0] && bracketState.east.cf[0].abbr)) {
      bracketState.champion = null;
    }
    rerenderBracket();
  }

  function isBracketComplete() {
    // All 8 R1 picks, all 4 semi picks, both CF picks, and both finalists known
    const allR1 = ['west','east'].every(c => bracketState[c].r1.every(x => x));
    const allSemi = ['west','east'].every(c => bracketState[c].semi.every(x => x));
    const allCF = ['west','east'].every(c => bracketState[c].cf[0]);
    return allR1 && allSemi && allCF;
  }

  function pickChampion(team) {
    pushHistory('champion');
    bracketState.champion = team;
    rerenderBracket();
    // Only show the celebration when the full bracket is filled out
    if (!team._placeholder && isBracketComplete()) showChampion(team);
  }

  // Returns the set of team abbrs that are valid winners of a given R1 matchup
  function r1Contestants(conf, matchupIdx) {
    const [top, bot] = getR1Teams(conf, matchupIdx);
    const valid = new Set();
    if (top) valid.add(top.abbr);
    if (bot) valid.add(bot.abbr);
    return valid;
  }

  // Returns the set of team abbrs that are valid winners of a given semi matchup
  // (i.e. winners of the two R1 matchups that feed it)
  function semiContestants(conf, semiIdx) {
    const r1a = semiIdx === 0 ? 0 : 2;
    const r1b = semiIdx === 0 ? 1 : 3;
    const valid = new Set();
    r1Contestants(conf, r1a).forEach(a => valid.add(a));
    r1Contestants(conf, r1b).forEach(a => valid.add(a));
    // Also include the stored R1 winners (they are always valid semi contestants)
    if (bracketState[conf].r1[r1a]) valid.add(bracketState[conf].r1[r1a].abbr);
    if (bracketState[conf].r1[r1b]) valid.add(bracketState[conf].r1[r1b].abbr);
    return valid;
  }

  // Returns the set of team abbrs that are valid CF contestants
  function cfContestants(conf) {
    const valid = new Set();
    semiContestants(conf, 0).forEach(a => valid.add(a));
    semiContestants(conf, 1).forEach(a => valid.add(a));
    if (bracketState[conf].semi[0]) valid.add(bracketState[conf].semi[0].abbr);
    if (bracketState[conf].semi[1]) valid.add(bracketState[conf].semi[1].abbr);
    return valid;
  }

  function invalidateDownstream(conf, round, idx) {
    // Surgical invalidation: only clear a slot if the stored pick is no longer
    // a valid contestant given the new pick. This preserves user advances that
    // don't conflict with the new pick.
    if (round === 'r1') {
      const semiIdx = idx < 2 ? 0 : 1;
      const newWinner = bracketState[conf].r1[idx];
      // Which teams can still win this semi? The new r1 winner + the other r1 slot's winner
      const otherR1Idx = semiIdx === 0 ? (idx === 0 ? 1 : 0) : (idx === 2 ? 3 : 2);
      const otherR1Winner = bracketState[conf].r1[otherR1Idx];
      const validSemi = new Set();
      if (newWinner) validSemi.add(newWinner.abbr);
      if (otherR1Winner) validSemi.add(otherR1Winner.abbr);
      // Also include all r1 contestants from both matchups (for when neither is picked yet)
      r1Contestants(conf, idx).forEach(a => validSemi.add(a));
      if (otherR1Winner) validSemi.add(otherR1Winner.abbr);

      const semiPick = bracketState[conf].semi[semiIdx];
      if (semiPick && !validSemi.has(semiPick.abbr)) {
        bracketState[conf].semi[semiIdx] = null;
        // Cascade to CF
        const cfPick = bracketState[conf].cf[0];
        const validCF = new Set();
        // Valid CF contestants = stored semi picks that weren't just cleared
        const s0 = bracketState[conf].semi[0], s1 = bracketState[conf].semi[1];
        if (s0) validCF.add(s0.abbr);
        if (s1) validCF.add(s1.abbr);
        // Also any semi contestant teams
        semiContestants(conf, 0).forEach(a => validCF.add(a));
        semiContestants(conf, 1).forEach(a => validCF.add(a));
        if (cfPick && !validCF.has(cfPick.abbr)) {
          bracketState[conf].cf[0] = null;
          bracketState[conf].finalsTeam = null;
          // Cascade to champion
          const champ = bracketState.champion;
          const validChamp = new Set();
          if (bracketState.west.cf[0]) validChamp.add(bracketState.west.cf[0].abbr);
          if (bracketState.east.cf[0]) validChamp.add(bracketState.east.cf[0].abbr);
          cfContestants('west').forEach(a => validChamp.add(a));
          cfContestants('east').forEach(a => validChamp.add(a));
          if (champ && !validChamp.has(champ.abbr)) bracketState.champion = null;
        }
      }
    } else if (round === 'semi') {
      const newWinner = bracketState[conf].semi[idx];
      const otherSemiWinner = bracketState[conf].semi[idx === 0 ? 1 : 0];
      const validCF = new Set();
      if (newWinner) validCF.add(newWinner.abbr);
      if (otherSemiWinner) validCF.add(otherSemiWinner.abbr);
      semiContestants(conf, idx).forEach(a => validCF.add(a));

      const cfPick = bracketState[conf].cf[0];
      if (cfPick && !validCF.has(cfPick.abbr)) {
        bracketState[conf].cf[0] = null;
        bracketState[conf].finalsTeam = null;
        // Cascade to champion
        const champ = bracketState.champion;
        const validChamp = new Set();
        if (bracketState.west.cf[0]) validChamp.add(bracketState.west.cf[0].abbr);
        if (bracketState.east.cf[0]) validChamp.add(bracketState.east.cf[0].abbr);
        cfContestants('west').forEach(a => validChamp.add(a));
        cfContestants('east').forEach(a => validChamp.add(a));
        if (champ && !validChamp.has(champ.abbr)) bracketState.champion = null;
      }
    } else if (round === 'cf') {
      const champ = bracketState.champion;
      const validChamp = new Set();
      if (bracketState.west.cf[0]) validChamp.add(bracketState.west.cf[0].abbr);
      if (bracketState.east.cf[0]) validChamp.add(bracketState.east.cf[0].abbr);
      cfContestants('west').forEach(a => validChamp.add(a));
      cfContestants('east').forEach(a => validChamp.add(a));
      if (champ && !validChamp.has(champ.abbr)) bracketState.champion = null;
    }
  }

  let confettiAnim = null;
  let confettiParticles = [];

  function startConfetti(teamColor) {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const colors = [teamColor, '#ffffff', '#ffaa00', '#ffd700', '#ff4d00'];
    confettiParticles = Array.from({length: 140}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: 8 + Math.random() * 10,
      h: 6 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.12,
      vx: (Math.random() - 0.5) * 3,
      vy: 3 + Math.random() * 4,
    }));
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiParticles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.88;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
        if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
      });
      confettiAnim = requestAnimationFrame(draw);
    }
    if (confettiAnim) cancelAnimationFrame(confettiAnim);
    draw();
  }

  function stopConfetti() {
    if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
    const canvas = document.getElementById('confetti-canvas');
    if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }
  }

    document.documentElement.style.setProperty('--accent', '#ff4d00');

  }

  function matchupHtml(conf, round, matchupIdx, topSeed, topTeam, botSeed, botTeam, winner, clickable) {

    const hasAny = topTeam || botTeam;

    if (hasAny && clickable) classes.push('clickable');
    if (hasAny && !winner) classes.push('pending');

    let topClass = '', botClass = '';
    if (winner) {
      topClass = topTeam && winner.abbr === topTeam.abbr ? 'winner-row' : (topTeam ? 'loser-row' : '');
      botClass = botTeam && winner.abbr === botTeam.abbr ? 'winner-row' : (botTeam ? 'loser-row' : '');
    }

    // Build click handlers · a team is clickable as long as it exists; opponent can be TBD
    const topClick = (hasAny && clickable && topTeam) ? `_bktPick('${conf}','${round}',${matchupIdx},'${topTeam.abbr}')` : '';
    const botClick = (hasAny && clickable && botTeam) ? `_bktPick('${conf}','${round}',${matchupIdx},'${botTeam.abbr}')` : '';

    return `<div class="${classes.join(' ')}">
      ${teamRowHtml(topSeed, topTeam, topClass, topClick)}
      ${teamRowHtml(botSeed, botTeam, botClass, botClick)}

    let team = findTeam(abbr);

  function simulateLottery() {
    // Assign ping pong ball counts (out of 1000)
    const ballCounts = [140, 140, 140, 125, 105, 90, 75, 60, 45, 30, 20, 15, 10, 5];
    let pool = [];
    lottery14.forEach((team, i) => {
      const count = ballCounts[i] || 0;
      for (let j = 0; j < count; j++) pool.push(i);
    });
    // Shuffle pool
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    // Draw top 4 picks
    const drawn = [];
    const usedPool = [...pool];
    while (drawn.length < 4) {
      const idx = Math.floor(Math.random() * usedPool.length);
      const pick = usedPool[idx];
      if (!drawn.includes(pick)) drawn.push(pick);
      usedPool.splice(idx, 1);
      if (usedPool.length === 0) break;
    }
    // Remaining picks 5-14 in original order, skipping drawn ones
    const remaining = lottery14.map((_, i) => i).filter(i => !drawn.includes(i));

      // Top 3 picks: only tier-1 players are eligible for #1,

      const eligible = availableProspects.filter(p => p.tier <= (pickNum === 1 ? 1 : 2));

      // Weights: rank 1 = 50, rank 2 = 30, rank 3 = 20 — #1 can shuffle but Koa Peat never goes here
      const weights = eligible.map(p => Math.max(1, 55 - p.rank * 15));
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      for (let i = 0; i < eligible.length; i++) {
        r -= weights[i];
        if (r <= 0) return eligible[i];
      }
      return eligible[eligible.length - 1];
    }

    // Score = (tier fit) + (positional need match) + (small random variance)
    const scored = availableProspects.map(p => {
      let score = 0;

      // Tier penalty: tier 1 = 60pts, tier 2 = 35pts, tier 3 = 10pts
      score += [60, 35, 10][p.tier - 1] || 5;

      // Positional need bonus: +25 if prospect's position matches any team need
      if (teamNeeds) {

      score += Math.max(0, 15 - p.rank);

      // Realistic variance: ±20 points of randomness
      score += (Math.random() - 0.5) * 40;

      return { prospect: p, score };

// ---- Core simulation engine ----
function doFullSim() {
  // Clone standings
  const standings = STANDINGS_DATA.map(t => ({
    ...t,
    wins: t.wins, losses: t.losses,
    simWins: t.wins, simLosses: t.losses,
    ...computePowerScore(t)
  }));
  const byAbbr = {};
  standings.forEach(t => { byAbbr[t.abbr] = t; });

  // Count remaining games (each team plays 82)
  // Estimate remaining per team from current record
  // Build a simple schedule: remaining = 82 - played
  // Simulate inter-team games via round-robin remainder
  const TOTAL_GAMES = 82;
  const remaining = {};
  standings.forEach(t => {
    remaining[t.abbr] = TOTAL_GAMES - t.wins - t.losses;
  });

  // Build remaining game pairs via a deterministic schedule approach:
  // Group into conf, assign remaining matchups proportionally
  // We simulate each team's remaining games against opponents weighted by schedule
  // Use a simplified but realistic approach: simulate each team's remaining games
  // by picking opponents from their conference (60%) and overall (40%)
  // To avoid double-counting, we pair teams and simulate shared games
  const simmedPairs = new Set();
  const gamesPlayed = {}; // abbr -> games added this sim
  standings.forEach(t => { gamesPlayed[t.abbr] = 0; });

  // Generate matchup list: pair each team needing games with others
  const matchups = [];
  const shuffled = [...standings].sort(() => Math.random() - 0.5);
  for (let i = 0; i < shuffled.length; i++) {
    for (let j = i + 1; j < shuffled.length; j++) {
      const a = shuffled[i], b = shuffled[j];
      const key = [a.abbr, b.abbr].sort().join('|');
      if (simmedPairs.has(key)) continue;
      // How many games could these two still play?
      const canA = remaining[a.abbr] - gamesPlayed[a.abbr];
      const canB = remaining[b.abbr] - gamesPlayed[b.abbr];
      if (canA <= 0 || canB <= 0) continue;
      // Typically 1-4 games between teams remaining
      const sameConf = a.conf === b.conf;
      const maxGames = sameConf ? Math.min(canA, canB, 3) : Math.min(canA, canB, 2);
      if (maxGames <= 0) continue;
      const numGames = Math.max(1, Math.floor(Math.random() * maxGames) + 1);
      for (let g = 0; g < numGames; g++) {
        if (gamesPlayed[a.abbr] < remaining[a.abbr] && gamesPlayed[b.abbr] < remaining[b.abbr]) {
          matchups.push([a, b, g % 2 === 0]); // alternate home court
          gamesPlayed[a.abbr]++;
          gamesPlayed[b.abbr]++;
        }
      }
      simmedPairs.add(key);
    }
  }

  // Simulate each remaining game
  matchups.forEach(([teamA, teamB, aIsHome]) => {
    const winner = simGame(teamA, teamB, aIsHome);
    byAbbr[winner].simWins++;
    const loser = winner === teamA.abbr ? teamB.abbr : teamA.abbr;
    byAbbr[loser].simLosses++;
  });

  // Any team that still has games remaining (due to pairing gaps), simulate vs avg opponent
  standings.forEach(t => {
    let needed = TOTAL_GAMES - t.simWins - t.simLosses;
    while (needed > 0) {
      // Simulate vs a random opponent of similar strength
      const opp = standings[Math.floor(Math.random() * standings.length)];
      if (opp.abbr === t.abbr) { needed--; continue; }
      const winner = simGame(t, opp, Math.random() > 0.5);
      byAbbr[winner].simWins++;
      const loser = winner === t.abbr ? opp.abbr : t.abbr;
      byAbbr[loser].simLosses++;
      needed--;
    }
  });

  // Now seed conferences from sim results
  const simWest = seedConferenceSim(standings.filter(t => t.conf === 'WEST'), byAbbr);
  const simEast = seedConferenceSim(standings.filter(t => t.conf === 'EAST'), byAbbr);

  // Play-In simulation
  const wPI = simWest.slice(6, 10);
  const ePI = simEast.slice(6, 10);
  const wSeed7 = simPlayIn78(wPI[0], wPI[1]);
  const wSeed8 = simPlayIn8(wPI[2], wPI[3], wPI[0] === wSeed7 ? wPI[1] : wPI[0]);
  const eSeed7 = simPlayIn78(ePI[0], ePI[1]);
  const eSeed8 = simPlayIn8(ePI[2], ePI[3], ePI[0] === eSeed7 ? ePI[1] : ePI[0]);

  // Build playoff bracket seeds (8 per conf)
  const wSeeds = [...simWest.slice(0, 6), wSeed7, wSeed8];
  const eSeeds = [...simEast.slice(0, 6), eSeed7, eSeed8];

  // Simulate playoffs
  const playoffResult = simulateFullPlayoffs(wSeeds, eSeeds);

  return { simWest, simEast, wSeeds, eSeeds, playoffResult, standings };
}

// Win probability using power score + home advantage + recent form
// Much more balanced · any team can beat any team on a given night
function simWinProb(teamA, teamB, aIsHome) {
  const powerA = teamA.power || computePowerScore(teamA).power;
  const powerB = teamB.power || computePowerScore(teamB).power;
  const homeBonus = aIsHome ? 2.0 : -2.0; // home court worth ~2 pts

  // Recent form bonus: teams on win streaks get a small boost
  const formA = getFormFactor(teamA);
  const formB = getFormFactor(teamB);

  // Compress power difference significantly · NBA is a parity league
  // Use 0.4 multiplier (was 0.8) to flatten the curve
  const diff = (powerA - powerB) * 0.4 + homeBonus + (formA - formB) * 1.2;
  const prob = 1 / (1 + Math.exp(-diff * 0.15));

  // Clamp to realistic range: even massive favorites can lose (floor 30%, ceiling 75%)
  // This ensures upsets happen regularly like real NBA
  return Math.max(0.28, Math.min(0.75, prob));
}

// Compute a form factor based on recent streak & season variance
function getFormFactor(team) {
  // Simulate form from streak field if available, else use small random noise
  const streak = team.streak || 0; // positive = win streak, negative = loss streak
  // Small form bonus/penalty, capped at ±2.5 points
  return Math.max(-2.5, Math.min(2.5, streak * 0.4));
}

function simGame(teamA, teamB, aIsHome) {
  const prob = simWinProb(teamA, teamB, aIsHome);
  return Math.random() < prob ? teamA.abbr : teamB.abbr;
}

// Simulate a playoff series, return { winner, loser, wWins, lWins, games }
function simSeries(teamA, teamB) {
  if (!teamA || !teamB) return { winner: teamA || teamB, loser: null, wWins: 4, lWins: 0, games: 4 };
  let winsA = 0, winsB = 0;
  let gameNum = 0;
  // Home court: teamA has home court (higher seed passed first)
  while (winsA < 4 && winsB < 4) {
    gameNum++;
    const aIsHome = [1,2,5,7].includes(gameNum); // HH AA HA H
    const w = simGame(teamA, teamB, aIsHome);
    if (w === teamA.abbr) winsA++; else winsB++;
  }
  const winner = winsA === 4 ? teamA : teamB;
  const loser = winsA === 4 ? teamB : teamA;
  return { winner, loser, wWins: Math.max(winsA, winsB), lWins: Math.min(winsA, winsB), games: winsA + winsB };
}

function simPlayIn78(t7, t8) {
  const w = simGame(t7, t8, true); // 7 seed hosts
  return w === t7.abbr ? t7 : t8;
}
function simPlayIn8(t9, t10, loserOf78) {
  // 9 vs 10 game first
  const w910 = simGame(t9, t10, true) === t9.abbr ? t9 : t10;
  // Winner of 9/10 plays loser of 7/8 for 8 seed
  const w = simGame(loserOf78, w910, false); // neutral-ish
  return w === loserOf78.abbr ? loserOf78 : w910;
}

function seedConferenceSim(teams, byAbbr) {
  return [...teams].map(t => ({
    ...t,
    simWins: byAbbr[t.abbr].simWins,
    simLosses: byAbbr[t.abbr].simLosses,
    power: computePowerScore(t).power
  })).sort((a, b) => {
    const aP = a.simWins / (a.simWins + a.simLosses);
    const bP = b.simWins / (b.simWins + b.simLosses);
    if (Math.abs(aP - bP) > 0.001) return bP - aP;
    return b.power - a.power;
  });
}

function simulateFullPlayoffs(wSeeds, eSeeds) {
  // Structure: { west: { r1, semi, cf }, east: { r1, semi, cf }, finals }
  // R1 matchups: 1v8, 4v5, 3v6, 2v7
  function buildR1(seeds) {
    return [
      simSeries(seeds[0], seeds[7]),
      simSeries(seeds[3], seeds[4]),
      simSeries(seeds[2], seeds[5]),
      simSeries(seeds[1], seeds[6]),
    ];
  }

  const wR1 = buildR1(wSeeds);
  const eR1 = buildR1(eSeeds);

  const wSemi = [
    simSeries(wR1[0].winner, wR1[1].winner),
    simSeries(wR1[2].winner, wR1[3].winner),
  ];
  const eSemi = [
    simSeries(eR1[0].winner, eR1[1].winner),
    simSeries(eR1[2].winner, eR1[3].winner),
  ];

  const wCF = simSeries(wSemi[0].winner, wSemi[1].winner);
  const eCF = simSeries(eSemi[0].winner, eSemi[1].winner);

  const finals = simSeries(wCF.winner, eCF.winner);

  return { wR1, eR1, wSemi, eSemi, wCF, eCF, finals };
}

function buildSimHalf(conf, seeds, r1, semi, cf) {
  const side = conf;
  let h = `<div class="bracket-half ${side}">`;

  // R1 (4 matchups)
  h += `<div class="bkt-round bkt-r1">`;
  const r1Pairings = [[0,7],[3,4],[2,5],[1,6]];
  const r1Seeds = [[1,8],[4,5],[3,6],[2,7]];
  r1.forEach((series, i) => {

  return h;

function generateSimNews(result) {
  const { simWest, simEast, playoffResult, standings } = result;
  const allSeries = [
    ...playoffResult.wR1, ...playoffResult.eR1,
    ...playoffResult.wSemi, ...playoffResult.eSemi,
    playoffResult.wCF, playoffResult.eCF, playoffResult.finals
  ];
  const champion = playoffResult.finals.winner;
  const finalist = playoffResult.finals.loser;
  const newsItems = [];

  // ── ALWAYS: Finals recap card ──────────────────────────────
  const finalsLeaders = generateFinalsLeaders(allSeries, champion, finalist);
  newsItems.push({ type: 'finals', data: { champion, finalist, finalsResult: playoffResult.finals, leaders: finalsLeaders } });

  // ── SWEEPS ─────────────────────────────────────────────────
  allSeries.forEach(series => {
    if (series && series.lWins === 0 && Math.random() < 0.7) {
      newsItems.push({ type: 'sweep', series });
    }
  });

  // ── UPSETS ─────────────────────────────────────────────────
  allSeries.forEach(series => {
    if (!series || !series.winner || !series.loser) return;
    const winPow = series.winner.power || computePowerScore(series.winner).power;
    const losPow = series.loser.power || computePowerScore(series.loser).power;
    if (losPow - winPow > 3 && Math.random() < 0.85) {
      newsItems.push({ type: 'upset', series });
    }
  });

  // ── RANDOM EVENTS (each with realistic probability) ─────────

  // 1. Star player injury · only for genuine stars, 12% chance per playoff team
  const playoffTeams = new Set();
  allSeries.forEach(s => { if(s){ playoffTeams.add(s.winner?.abbr); playoffTeams.add(s.loser?.abbr); }});
  playoffTeams.forEach(abbr => {
    if (!abbr || !STAR_PLAYERS[abbr] || Math.random() > 0.12) return;
    // Only injure the #1 star (index 0) · never depth players
    const player = STAR_PLAYERS[abbr][0];
    const injury = INJURY_TYPES[Math.floor(Math.random() * INJURY_TYPES.length)];
    const teamSeries = allSeries.find(s => s && (s.winner?.abbr === abbr || s.loser?.abbr === abbr));
    const opp = teamSeries ? (teamSeries.winner?.abbr === abbr ? teamSeries.loser : teamSeries.winner) : null;
    newsItems.push({ type: 'injury', player, injury, team: STANDINGS_DATA.find(t => t.abbr === abbr), opp, series: teamSeries });
  });

  // 2. Historic scoring performance (4% chance per playoff game)
  const scoringEvents = [
    { pts: 72, desc: "breaks Michael Jordan's single-game playoff scoring record with an ASTOUNDING" },
    { pts: 68, desc: "erupts for an eye-watering" },
    { pts: 65, desc: "drops a mind-bending" },
    { pts: 61, desc: "goes absolutely nuclear with" },
    { pts: 58, desc: "lights up the scoreboard for" },
  ];
  if (Math.random() < 0.18) {
    const topTeams = [...playoffTeams].filter(a => STAR_PLAYERS[a]);
    const randAbbr = topTeams[Math.floor(Math.random() * topTeams.length)];
    if (randAbbr) {
      const player = STAR_PLAYERS[randAbbr][0];
      const evt = scoringEvents[Math.floor(Math.random() * scoringEvents.length)];
      const randSeries = allSeries[Math.floor(Math.random() * allSeries.length)];
      newsItems.push({ type: 'scoring', player, team: STANDINGS_DATA.find(t=>t.abbr===randAbbr), evt, series: randSeries });
    }
  }

  // 3. Regular season record (champion wins record)
  const champStanding = standings.find(t => t.abbr === champion.abbr);
  if (champStanding && champStanding.simWins >= 65 && Math.random() < 0.75) {
    newsItems.push({ type: 'winrecord', team: champStanding });
  }

  // 4. Series going 7 games
  const sevenGamers = allSeries.filter(s => s && s.games === 7);
  if (sevenGamers.length > 0 && Math.random() < 0.8) {
    newsItems.push({ type: 'seven', series: sevenGamers[Math.floor(Math.random() * sevenGamers.length)] });
  }

  // 5. Margin of victory record
  const chStanding = standings.find(t => t.abbr === champion.abbr);
  if (chStanding && Math.random() < 0.12) {
    newsItems.push({ type: 'margin', team: chStanding });
  }

  // 6. Underdog run (team seeded 5+ wins conf finals)
  const confFinalistsSeeds = [
    ...playoffResult.wSemi.map(s => s.winner),
    ...playoffResult.eSemi.map(s => s.winner),
  ];
  // Check if CF winner was lower seeded
  const wCFLoser = playoffResult.wCF.loser;
  const eCFLoser = playoffResult.eCF.loser;
  if (Math.random() < 0.2) {
    const udTeam = Math.random() < 0.5 ? playoffResult.wCF.winner : playoffResult.eCF.winner;
    const udStand = standings.find(t => t.abbr === udTeam?.abbr);
    if (udStand) newsItems.push({ type: 'cinderella', team: udStand, champion });
  }

  // 7. Goat debate moment (8% chance)
  if (Math.random() < 0.08 && STAR_PLAYERS[champion.abbr]) {
    const player = STAR_PLAYERS[champion.abbr][0];
    newsItems.push({ type: 'goat', player, team: champion });
  }

  // 8. Coach fired (losing team) 8% chance
  const COACHES = {OKC:"Mark Daigneault",SAS:"Gregg Popovich",DET:"JB Bickerstaff",BOS:"Joe Mazzulla",NYK:"Tom Thibodeau",LAL:"JJ Redick",DEN:"Michael Malone",CLE:"Kenny Atkinson",MIN:"Chris Finch",HOU:"Ime Udoka",ATL:"Quin Snyder",TOR:"Darko Rajakovic",PHI:"Nick Nurse",PHX:"Mike Budenholzer",CHA:"Charles Lee",MIA:"Erik Spoelstra",ORL:"Jamahl Mosley",LAC:"Tyronn Lue",POR:"Chauncey Billups",GSW:"Steve Kerr",MEM:"Taylor Jenkins",DAL:"Jason Kidd",SAC:"Doug Christie",IND:"Rick Carlisle"};
  if (Math.random() < 0.08) {
    const losingTeam = playoffResult.finals.loser;
    const coach = COACHES[losingTeam.abbr] || "the head coach";
    newsItems.push({ type: 'firingRumor', team: losingTeam, coach });
  }

  // 9. Controversial call (12% chance)
  if (Math.random() < 0.12) {
    const randSeries = allSeries[Math.floor(Math.random() * allSeries.length)];
    if (randSeries) newsItems.push({ type: 'controversial', series: randSeries });
  }

  // 10. Historic comeback
  if (Math.random() < 0.1) {
    const candidates = allSeries.filter(s => s && s.games >= 6);
    if (candidates.length) {
      newsItems.push({ type: 'comeback', series: candidates[Math.floor(Math.random() * candidates.length)] });
    }
  }

  return newsItems;
}

function generateFinalsLeaders(allSeries, champion, finalist) {
  // Generate plausible playoff stat leaders
  const playoffTeams = [...new Set(allSeries.flatMap(s => s ? [s.winner?.abbr, s.loser?.abbr].filter(Boolean) : []))];

  function randStar(abbr) {
    if (!abbr || !STAR_PLAYERS[abbr]) return null;
    return STAR_PLAYERS[abbr][0];
  }

  // PPG leader: tends to be from champion or finalist
  const pTeam = Math.random() < 0.6 ? champion.abbr : finalist.abbr;
  const ppgLeader = randStar(pTeam) || randStar(champion.abbr);
  const ppg = (28 + Math.random() * 12).toFixed(1);

  // Assists: PG type
  const pgTeams = playoffTeams.filter(a => STAR_PLAYERS[a]?.[0]?.pos === 'PG');
  const aTeam = pgTeams[Math.floor(Math.random() * pgTeams.length)] || champion.abbr;
  const astLeader = randStar(aTeam);
  const apg = (7 + Math.random() * 5).toFixed(1);

  // Rebounds: C type
  const cTeams = playoffTeams.filter(a => STAR_PLAYERS[a]?.[0]?.pos === 'C' || STAR_PLAYERS[a]?.[1]?.pos === 'C');
  const rTeam = cTeams[Math.floor(Math.random() * cTeams.length)] || champion.abbr;
  const rebLeader = (STAR_PLAYERS[rTeam] || []).find(p => p.pos === 'C') || randStar(rTeam);
  const rpg = (10 + Math.random() * 5).toFixed(1);

  // Finals MVP: best player on champion
  const fmvp = randStar(champion.abbr);
  const fmvpPpg = (25 + Math.random() * 15).toFixed(1);
  const fmvpRpg = (6 + Math.random() * 8).toFixed(1);
  const fmvpApg = (4 + Math.random() * 7).toFixed(1);

  // Defensive player: usually a big
  const defTeam = playoffTeams[Math.floor(Math.random() * playoffTeams.length)];
  const defPlayer = (STAR_PLAYERS[defTeam] || []).find(p => p.pos === 'C' || p.pos === 'PF') || randStar(defTeam);

  return {
    ppgLeader: { player: ppgLeader, team: STANDINGS_DATA.find(t=>t.abbr===pTeam), stat: ppg, label: 'PPG Leader' },
    astLeader: { player: astLeader, team: STANDINGS_DATA.find(t=>t.abbr===aTeam), stat: apg, label: 'APG Leader' },
    rebLeader: { player: rebLeader, team: STANDINGS_DATA.find(t=>t.abbr===rTeam), stat: rpg, label: 'RPG Leader' },
    fmvp: { player: fmvp, team: champion, ppg: fmvpPpg, rpg: fmvpRpg, apg: fmvpApg },
    defPlayer: { player: defPlayer, team: STANDINGS_DATA.find(t=>t.abbr===defTeam), label: 'Def. Player of Playoffs' },
  };
}

      `In what could be a season-altering moment, <strong>${player.name}</strong> left Game ${gameNum} in the ${Math.random() > 0.5 ? 'first half' : 'fourth quarter'} after appearing to <em>${injury.type}</em>. The ${teamName} locker room is reportedly in shock. The diagnosis: <em>${injury.severity}</em>. The basketball world is watching.`,
      `<strong>${player.name}</strong> was trending on social media within seconds of going down in Game ${gameNum}. The ${teamName} star <em>${injury.type}</em> and did not return. Team sources describe the injury as <em>${injury.severity}</em>. Whether this derails ${teamName}'s entire playoff run remains to be seen.`,
    ];
    body = bodyVariants[Math.floor(Math.random() * bodyVariants.length)];
  } else if (item.type === 'scoring') {
    const { player, team, evt, series } = item;
    const assists = Math.floor(Math.random() * 10) + 3;
    const rebounds = Math.floor(Math.random() * 10) + 4;
    const gameNum = Math.floor(Math.random() * 6) + 1;
    headline = `${player.name.toUpperCase()} DROPS ${evt.pts} IN GAME ${gameNum} · ALL-TIME PERFORMANCE`;
    body = `Historians are scrambling through the record books. <strong>${player.name}</strong> ${evt.desc} <strong>${evt.pts} points</strong> in Game ${gameNum}, adding ${rebounds} rebounds and ${assists} assists for good measure. The building was in absolute pandemonium. Opponents looked defeated before halftime. This is a performance they'll be talking about for decades.`;
    statsHtml = `<div class="news-stats-row">
      <div class="news-stat-item"><div class="news-stat-val" style="color:var(--accent)">${evt.pts}</div><div class="news-stat-lbl">Points</div></div>
      <div class="news-stat-item"><div class="news-stat-val" style="color:var(--green)">${rebounds}</div><div class="news-stat-lbl">Rebounds</div></div>
      <div class="news-stat-item"><div class="news-stat-val" style="color:var(--blue)">${assists}</div><div class="news-stat-lbl">Assists</div></div>
    </div>`;
  } else if (item.type === 'winrecord') {
    const { team } = item;
    headline = `${team.name.toUpperCase()} FINISH WITH ALL-TIME GREAT RECORD: ${team.simWins}–${team.simLosses}`;
    body = `The <strong>${team.name}</strong> have completed one of the most dominant regular seasons in NBA history, finishing ${team.simWins}–${team.simLosses}. Basketball Reference servers are reportedly overloaded with fans looking up historical comparisons. <em>"Nobody was stopping this team,"</em> said one Western Conference scout. <em>"Nobody."</em>`;
  } else if (item.type === 'seven') {
    const { series } = item;
    headline = `EPIC: ${series.winner.name.toUpperCase()} SURVIVE 7-GAME WAR WITH ${series.loser.name.toUpperCase()}`;
    body = `They needed all seven games, and every single one of them felt like a Game 7. <strong>${series.winner.name}</strong> and <strong>${series.loser.name}</strong> gave the fans exactly what they paid for · a brutal, beautiful war that ended with the slimmest of margins. <strong>${series.winner.name}</strong> advance, but they'll need to recover fast.`;
  } else if (item.type === 'cinderella') {
    const { team } = item;
    headline = `THE CINDERELLA STORY: ${team.name.toUpperCase()} MAKE IMPROBABLE DEEP RUN`;
    body = `Nobody circled <strong>${team.name}</strong> in their bracket. Their ${team.simWins}–${team.simLosses} regular season record didn't exactly scream contender. And yet, here they are, thriving in the playoffs. Call it chemistry, call it luck, call it destiny · this team refuses to quit and the NBA world is absolutely riveted.`;
  } else if (item.type === 'goat') {
    const { player, team } = item;
    headline = `IS ${player.name.toUpperCase()} THE GREATEST PLAYOFF PERFORMER WE'VE EVER SEEN?`;
    body = `The GOAT conversation isn't going away after this. <strong>${player.name}</strong>'s postseason résumé after this championship run is nothing short of historic. Social media is melting, analysts are arguing, and grandparents are asking what a GOAT is. This performance demands respect regardless of where you stand.`;
  } else if (item.type === 'firingRumor') {
    const { team, coach } = item;
    headline = `RUMOR MILL: ${coach.toUpperCase()} COACHING FUTURE IN QUESTION AFTER FINALS LOSS`;
    body = `Sources close to the <strong>${team.name}</strong> organization say conversations have already begun about the team's direction. <strong>${coach}</strong> went to the Finals, but the question of "what could have been" is already creeping into boardroom discussions. A championship-or-bust mandate was always in play. Now the bust part may have consequences.`;
  } else if (item.type === 'controversial') {
    const { series } = item;
    const gameNum = Math.floor(Math.random() * 6) + 1;
    headline = `CONTROVERSY IN GAME ${gameNum}: REFS BLOW CALL IN ${series.winner.abbr} vs ${series.loser.abbr}`;
    body = `The basketball internet is on fire. With seconds remaining in Game ${gameNum}, a pivotal call · or non-call · has the <strong>${series.loser.name}</strong> fanbase convinced they were robbed. The NBA's Last Two Minute Report is already being prepped. The debate will rage for weeks. Whether it changed the series is impossible to say, but everyone has an opinion.`;
  } else if (item.type === 'comeback') {
    const { series } = item;
    headline = `DOWN 3-1, ${series.winner.name.toUpperCase()} STAGE MIRACLE COMEBACK`;
    body = `History said it was over. Statistically, <strong>${series.winner.name}</strong> had almost no chance. Trailing 3-1, they somehow did what almost no team in NBA history has done · won three straight to advance. The locker room speech on the eve of Game 5 will become the stuff of legend. The <strong>${series.loser.name}</strong> are absolutely devastated.`;
  }

  if (!headline) return '';

  html = `<div class="news-card">
    <div class="news-card-stripe" style="background:${stripeColor}"></div>
    <div class="news-card-body">
      <div class="news-card-meta">
        <span class="news-category-pill ${catClass}">${catLabel}</span>
        <span class="news-timestamp">${ts} · 2026 Playoffs</span>
      </div>
      <div class="news-headline">${headline}</div>
      <div class="news-body">${body}${statsHtml}</div>
    </div>
  </div>`;
  return html;
}

function renderLeader(l) {
  if (!l || !l.player) return '';
  return `<div class="news-leader-card">
    <div class="news-leader-cat">${l.label}</div>
    <div class="news-leader-name">${l.player.name}</div>
    <div class="news-leader-team">${l.team?.abbr || ''}</div>
    <div class="news-leader-val" style="color:var(--accent2)">${l.stat}</div>
  </div>`;
}

function renderNews(newsItems) {
  if (!newsItems || newsItems.length === 0) {
    document.getElementById('news-container').innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px">NO NEWS STORIES GENERATED THIS SIMULATION</div>`;
    return;
  }

  let html = `<div class="news-layout">
    <div class="news-run-bar">
      <button class="news-run-btn" onclick="runSeasonSim()">▶ Re-Simulate & Refresh News</button>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:1px;color:var(--muted);flex:1">
        ${newsItems.length} stories generated · Click stories may vary each simulation
      </div>
    </div>
    <div class="news-feed">`;

  // Finals card first
  const finalsItem = newsItems.find(i => i.type === 'finals');
  if (finalsItem) html += renderNewsCard(finalsItem);

  // Rest shuffled
  const rest = newsItems.filter(i => i.type !== 'finals');
  rest.sort(() => Math.random() - 0.5);
  rest.forEach(item => { html += renderNewsCard(item); });

  html += `</div></div>`;
  document.getElementById('news-container').innerHTML = html;
}
