<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnson's Clanker Ranker</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #222230;
    --accent: #ff4d00;
    --accent2: #ffaa00;
    --gold: #c9a84c;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #00e87a;
    --red: #ff3355;
    --blue: #3399ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0d16 0%, transparent 100%);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
  }
  .logo-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #ff4d00 0%, #ffaa00 50%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-block .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--green);
    text-transform: uppercase;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,232,122,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,232,122,0); }
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    position: relative;
    z-index: 10;
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    padding: 16px 24px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* MAIN CONTENT */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px;
    position: relative;
    z-index: 10;
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .section-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .updated-time {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }

  /* POWER RANKINGS TABLE */
  .rankings-table {
    width: 100%;
    border-collapse: collapse;
  }
  .rankings-table thead tr {
    border-bottom: 1px solid var(--border);
  }
  .rankings-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
  }
  .rankings-table th.center { text-align: center; }
  .rankings-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .rankings-table tbody tr:hover { background: var(--surface2); }
  .rankings-table td {
    padding: 13px 14px;
    font-size: 0.92rem;
  }
  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--muted);
    width: 40px;
    text-align: center;
  }
  .rank-num.top3 { color: var(--gold); }
  .rank-move-cell {
    width: 28px;
    min-width: 28px;
    padding: 0 2px !important;
    text-align: center;
    vertical-align: middle;
  }
  .rank-move {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
  }
  .rank-move-arrow { font-size: 0.55rem; line-height: 1.1; }
  .rank-move-num   { font-size: 0.58rem; line-height: 1; letter-spacing: 0; }
  .rank-move.up   { color: var(--green); }
  .rank-move.down { color: var(--red); }
  .team-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .team-abbr-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    width: 42px;
    text-align: center;
    padding: 4px 0;
    border-radius: 4px;
    color: #fff;
  }
  .team-name-full {
    font-weight: 500;
    font-size: 0.95rem;
  }
  .team-conf {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }
  .power-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 1px;
  }
  .trend-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .trend-hot { background: rgba(255,77,0,0.15); color: #ff7744; border: 1px solid rgba(255,77,0,0.3); }
  .trend-cold { background: rgba(51,153,255,0.15); color: #66aaff; border: 1px solid rgba(51,153,255,0.3); }
  .trend-neutral { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  /* Streak color spectrum */
  .streak-grey { background: rgba(255,255,255,0.06); color: #888899; border: 1px solid rgba(255,255,255,0.1); }
  .streak-w2 { background: rgba(255,200,50,0.10); color: #ddbb44; border: 1px solid rgba(255,200,50,0.25); }
  .streak-w3 { background: rgba(255,170,0,0.13); color: #ffaa00; border: 1px solid rgba(255,170,0,0.3); }
  .streak-w4 { background: rgba(255,120,0,0.15); color: #ff8822; border: 1px solid rgba(255,120,0,0.3); }
  .streak-w5 { background: rgba(255,77,0,0.18); color: #ff6633; border: 1px solid rgba(255,77,0,0.35); }
  .streak-l2 { background: rgba(100,180,255,0.10); color: #88bbdd; border: 1px solid rgba(100,180,255,0.25); }
  .streak-l3 { background: rgba(70,150,255,0.13); color: #6699cc; border: 1px solid rgba(70,150,255,0.3); }
  .streak-l4 { background: rgba(51,130,255,0.15); color: #5588cc; border: 1px solid rgba(51,130,255,0.3); }
  .streak-l5 { background: rgba(30,100,255,0.18); color: #4477dd; border: 1px solid rgba(30,100,255,0.35); }
  .streak-best { background: rgba(255,50,0,0.25); color: #ff4400; border: 1px solid rgba(255,50,0,0.5); box-shadow: 0 0 8px rgba(255,77,0,0.3); }
  .streak-worst { background: rgba(0,60,220,0.25); color: #3366ee; border: 1px solid rgba(0,60,220,0.5); box-shadow: 0 0 8px rgba(30,100,255,0.3); }
  .bar-cell { min-width: 120px; }
  .last-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .last-result {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .last-wl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 1px;
    min-width: 14px;
  }
  .last-wl.win  { color: var(--green); }
  .last-wl.loss { color: var(--red); }
  .last-score { color: var(--text); font-weight: 600; font-size: 0.82rem; }
  .last-at    { color: var(--muted); font-size: 0.75rem; }
  .last-opp-logo {
    width: 18px; height: 14px;
    object-fit: contain;
    border-radius: 2px;
    vertical-align: middle;
  }
  .last-opp-abbr { color: var(--muted); font-size: 0.8rem; }
  .last-none { color: var(--muted); font-size: 0.78rem; }
  .power-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .power-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }
  .win-pct-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
  }
  .record-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    color: var(--muted);
  }
  .sos-cell, .ortg-cell {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
  }

  /* SORTABLE HEADERS */
  .rankings-table th.sortable {
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: color 0.2s;
  }
  .rankings-table th.sortable:hover {
    color: var(--accent);
  }
  .rankings-table th.sortable .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 0.65rem;
    vertical-align: middle;
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .rankings-table th.sortable.sort-active .sort-arrow {
    opacity: 1;
    color: var(--accent);
  }
  .rankings-table th.sortable.sort-active {
    color: var(--accent);
  }


  /* SCORES GRID */
  .scores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── SCORES TAB REDESIGN ─────────────────────────────── */
  .scores-section-label {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 18px;
  }
  .scores-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .scores-section-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .scores-live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  .scores-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    margin: 32px 0 28px;
  }

  /* Score card redesign */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
  }
  .score-card:hover { border-color: rgba(255,77,0,0.35); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .score-card-top {
    padding: 10px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .score-card-body { padding: 14px 16px 16px; }
  .score-time-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .score-status {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 2px 9px;
    border-radius: 12px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .status-final { background: rgba(255,255,255,0.07); color: var(--muted); }
  .status-upcoming { background: rgba(0,232,122,0.1); color: var(--green); border: 1px solid rgba(0,232,122,0.2); }
  .status-live { background: rgba(255,77,0,0.18); color: var(--accent); border: 1px solid rgba(255,77,0,0.35); animation: pulse 1.5s ease-in-out infinite; }
  .score-teams-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 12px;
  }
  .score-team-block {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-team-block.away { flex-direction: row; }
  .score-team-block.home { flex-direction: row-reverse; text-align: right; }
  .score-logo-wrap {
    width: 38px; height: 32px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    padding: 3px 4px;
    flex-shrink: 0;
  }
  .score-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .score-team-info { flex: 1; }
  .score-team-abbr-lg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.55rem;
    letter-spacing: 2px;
    line-height: 1;
  }
  .score-team-record {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .score-vs-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px;
    gap: 2px;
  }
  .score-vs-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 1px;
    line-height: 1;
    min-width: 36px;
    text-align: center;
  }
  .score-vs-num.won { color: var(--text); }
  .score-vs-num.lost { color: var(--muted); }
  .score-vs-num.live-score { color: var(--green); }
  .score-vs-dash {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    padding: 0 2px;
  }
  .score-final-scores {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .score-prob-bar {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .score-prob-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 5px;
  }
  .score-prob-track {
    height: 4px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }
  .prob-away { height: 100%; background: var(--blue); border-radius: 3px 0 0 3px; }
  .prob-home { height: 100%; background: var(--accent); border-radius: 0 3px 3px 0; }

  /* Games to Watch card · special highlight */
  .score-card.gtw {
    border-color: rgba(255,170,0,0.25);
    background: linear-gradient(135deg, rgba(255,170,0,0.04) 0%, var(--surface) 60%);
  }
  .score-card.gtw:hover { border-color: rgba(255,170,0,0.55); }
  .gtw-flag {
    position: absolute;
    bottom: 0; right: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 2px;
    padding: 3px 8px 3px 10px;
    border-radius: 8px 0 10px 0;
  }
  .gtw-matchup-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    color: var(--accent2);
    letter-spacing: 1px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,170,0,0.15);
  }

  /* Close game banner */
  .close-game-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: linear-gradient(90deg, rgba(255,51,85,0.18) 0%, rgba(255,77,0,0.18) 100%);
    border-top: 1px solid rgba(255,51,85,0.3);
    padding: 5px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--red);
    animation: close-game-pulse 1.2s ease-in-out infinite;
  }
  .close-game-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes close-game-pulse {
    0%,100% { background: linear-gradient(90deg, rgba(255,51,85,0.18) 0%, rgba(255,77,0,0.18) 100%); }
    50% { background: linear-gradient(90deg, rgba(255,51,85,0.28) 0%, rgba(255,77,0,0.28) 100%); }
  }

  /* Live score pulse ring */
  .score-card.is-live {
    border-color: rgba(255,77,0,0.3);
  }
  .score-card.is-live::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 1px solid rgba(255,77,0,0.2);
    animation: pulse-ring 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse-ring {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* No games message */
  .no-games-msg {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 3px;
    font-size: 0.85rem;
    text-transform: uppercase;
  }
  .scores-api-notice {
    background: rgba(255,170,0,0.07);
    border: 1px solid rgba(255,170,0,0.2);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    color: var(--accent2);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .conf-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    color: var(--accent2);
    margin: 32px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .conf-header:first-of-type { margin-top: 0; }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .standings-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.73rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }
  .standings-table th:first-child, .standings-table th:nth-child(2) { text-align: left; }
  .standings-table td {
    padding: 11px 12px;
    text-align: right;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .standings-table td:first-child { text-align: center; color: var(--muted); font-size: 0.9rem; width: 32px; }
  .standings-table td:nth-child(2) { text-align: left; font-family: 'Barlow', sans-serif; font-weight: 500; font-size: 0.9rem; }
  .standings-table tr:hover td { background: var(--surface2); }
  .standings-table .playoff-line td { border-bottom: 2px solid rgba(255,77,0,0.5); }
  .win-pct { font-weight: 600; color: var(--text); }

  /* PREDICTIONS TAB */
  .pred-header-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .pred-record-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }
  .pred-record-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    line-height: 1;
  }
  .pred-record-num.wins { color: var(--green); }
  .pred-record-num.losses { color: var(--red); }
  .pred-record-num.pct { color: var(--accent2); }
  .pred-date-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .pred-date-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .pred-date-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .pred-date-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pred-date-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 100px;
    text-align: center;
  }
  .pred-generate-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid rgba(255,77,0,0.5);
    background: rgba(255,77,0,0.12);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 700;
  }
  .pred-generate-btn:hover { background: rgba(255,77,0,0.22); }
  .pred-generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pred-spotlight-section {
    margin-bottom: 22px;
  }
  .pred-spotlight-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .pred-cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }
  .pred-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pred-card.correct { border-color: rgba(0,232,122,0.5); }
  .pred-card.wrong   { border-color: rgba(255,51,85,0.5); }
  /* header band */
  .pred-card-header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 14px 12px;
    position: relative;
    min-height: 72px;
  }
  .pred-card-header-bg {
    position: absolute;
    inset: 0;
    opacity: 0.22;
  }
  .pred-team-side {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .pred-team-side.home { flex-direction: row-reverse; }
  .pred-logo-wrap {
    width: 44px; height: 38px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 4px; flex-shrink: 0;
  }
  .pred-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .pred-team-info { line-height: 1.1; }
  .pred-team-side.home .pred-team-info { text-align: right; }
  .pred-team-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 1px;
  }
  .pred-team-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
  }
  /* ── Injury badge on pick cards ─────────────────────────── */
  .pred-inj-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    line-height: 1;
    cursor: default;
    position: relative;
    vertical-align: middle;
    margin-left: 4px;
  }
  .pred-inj-badge .pred-inj-icon {
    font-size: 0.9rem;
    filter: drop-shadow(0 0 3px rgba(255,180,0,0.6));
  }
  .pred-inj-badge.returning .pred-inj-icon {
    filter: drop-shadow(0 0 3px rgba(0,220,130,0.6));
  }
  .pred-inj-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 7px;
    padding: 8px 10px;
    min-width: 180px;
    max-width: 240px;
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.55);
  }
  .pred-inj-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(255,255,255,0.15);
  }
  .pred-inj-badge:hover .pred-inj-tooltip { display: block; }
  .pred-inj-tooltip-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 5px;
  }
  .pred-inj-tooltip-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.9);
    padding: 2px 0;
  }
  .pred-inj-tooltip-row + .pred-inj-tooltip-row {
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .pred-inj-tooltip-penalty {
    font-size: 0.75rem;
    color: #ff6b6b;
    white-space: nowrap;
  }
  .pred-inj-tooltip-boost {
    font-size: 0.75rem;
    color: #00dc82;
    white-space: nowrap;
  }
  .pred-inj-tooltip-games {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
  }
  /* ─────────────────────────────────────────────────────────── */
  .pred-team-rec {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  .pred-center-info {
    text-align: center;
    position: relative;
    z-index: 1;
    padding: 0 10px;
  }
  .pred-tip-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    display: block;
  }
  .pred-at-sign {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
  }
  .pred-live-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; letter-spacing: 2px;
    color: var(--green); text-transform: uppercase;
    margin-bottom: 2px;
  }
  .pred-live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .pred-score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 3px;
    color: #fff; line-height: 1;
  }
  .pred-score-sep { color: rgba(255,255,255,0.4); margin: 0 2px; }
  .pred-game-clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 1px;
  }
  /* stat table */
  .pred-stats-row { border-top: 1px solid var(--border); padding: 0; }
  .pred-stat-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 5px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .pred-stat-row:last-child { border-bottom: none; }
  .pred-stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.92rem; font-weight: 700; letter-spacing: 0.5px;
  }
  .pred-stat-val.away { text-align: left; }
  .pred-stat-val.home { text-align: right; }
  .pred-stat-val.better { color: var(--green); }
  .pred-stat-val.worse  { color: var(--muted); }
  .pred-stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; text-align: center; padding: 0 10px;
  }
  /* pick bar */
  .pred-pick-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; position: relative; overflow: hidden; min-height: 56px;
    border-top: 1px solid rgba(0,0,0,0.2);
  }
  .pred-pick-bar-bg { position: absolute; inset: 0; }
  .pred-pick-left {
    display: flex; align-items: center; gap: 12px;
    position: relative; z-index: 1;
  }
  .pred-pick-logo {
    width: 48px; height: 40px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; padding: 4px 5px;
    background: rgba(0,0,0,0.30); border: 1px solid rgba(255,255,255,0.18);
  }
  .pred-pick-logo img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5)); }
  .pred-pick-text { display: flex; flex-direction: column; gap: 0; }
  .pred-pick-label-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; letter-spacing: 3px; color: rgba(255,255,255,0.55);
    text-transform: uppercase; line-height: 1;
  }
  .pred-pick-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 3px; color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5); line-height: 1;
  }
  .pred-pick-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; letter-spacing: 1px;
    padding: 2px 8px; border-radius: 10px; font-weight: 700;
    background: rgba(0,0,0,0.35); color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
    position: relative; z-index: 1;
  }
  .pred-pick-right {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; letter-spacing: 2px;
    color: rgba(255,255,255,0.9); text-transform: uppercase;
    position: relative; z-index: 1; display: flex; align-items: center; gap: 6px;
  }
  /* On coloured pick bar, force dark bg on all badges for legibility */
  .pred-pick-bar .pred-ml-badge,
  .pred-pick-bar .pred-result-badge,
  .pred-pick-bar .pred-payout-badge {
    background: rgba(0,0,0,0.40) !important;
    color: #fff !important;
    border-color: rgba(255,255,255,0.22) !important;
  }
  .pred-pick-bar .pred-result-badge.correct { color: #7fff9e !important; border-color: rgba(127,255,158,0.40) !important; }
  .pred-pick-bar .pred-result-badge.wrong   { color: #ff9090 !important; border-color: rgba(255,144,144,0.40) !important; }
  .pred-result-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; letter-spacing: 2px;
    padding: 2px 10px; border-radius: 12px; font-weight: 700;
    text-transform: uppercase; position: relative; z-index: 1;
  }
  .pred-result-badge.correct { background: rgba(0,232,122,0.25); color: var(--green); border: 1px solid rgba(0,232,122,0.4); }
  .pred-result-badge.wrong   { background: rgba(255,51,85,0.25);  color: var(--red);   border: 1px solid rgba(255,51,85,0.4); }
  .pred-reasoning {
    padding: 10px 14px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.82rem; color: var(--muted); line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .pred-final-score {
    padding: 5px 14px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem; color: var(--muted); letter-spacing: 1px;
  }
  .pred-final-score b { color: var(--text); }
  .pred-no-games {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 3px;
    font-size: 0.85rem;
    text-transform: uppercase;
  }
  .pred-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .pred-history-section {
    margin-top: 40px;
  }
  .pred-history-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .pred-history-row:hover { background: var(--surface2); }
  .pred-history-date { color: var(--muted); min-width: 90px; letter-spacing: 1px; }
  .pred-history-rec  { font-weight: 700; }
  .pred-history-rec.good  { color: var(--green); }
  .pred-history-rec.bad   { color: var(--red); }
  .pred-history-rec.mid   { color: var(--accent2); }
  .pred-history-games { color: var(--muted); font-size: 0.8rem; flex: 1; }


  /* MONEYLINE & BETTING LEDGER */
  .pred-ml-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; letter-spacing: 1px; font-weight: 700;
    padding: 3px 9px; border-radius: 8px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    position: relative; z-index: 1;
  }
  .pred-ml-badge.fav  { background: rgba(0,210,100,0.20); color: #4dffa0; border-color: rgba(0,210,100,0.45); }
  .pred-ml-badge.dog  { background: rgba(255,160,0,0.20);  color: #ffc844; border-color: rgba(255,160,0,0.45); }
  .pred-payout-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; letter-spacing: 1px; font-weight: 700;
    padding: 3px 9px; border-radius: 10px;
    position: relative; z-index: 1;
  }
  .pred-payout-badge.win  { background: rgba(0,232,122,0.2); color: var(--green); border: 1px solid rgba(0,232,122,0.4); }
  .pred-payout-badge.loss { background: rgba(255,51,85,0.2); color: var(--red); border: 1px solid rgba(255,51,85,0.4); }
  .pred-bet-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .pred-bet-row-left { display: flex; align-items: center; gap: 8px; }
  .pred-bet-row-stake { color: var(--text); font-weight: 600; }
  .pred-bet-row-right { display: flex; align-items: center; gap: 8px; }
  .pred-bet-payout-preview {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 1.5px;
  }
  .pred-bet-payout-preview.win { color: var(--green); }
  .pred-bet-payout-preview.loss { color: var(--red); }
  .pred-ledger-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; letter-spacing: 1px;
  }
  .pred-ledger-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; letter-spacing: 1px;
  }
  .pred-ledger-val.up   { color: var(--green); }
  .pred-ledger-val.down { color: var(--red); }
  .pred-ledger-val.even { color: var(--muted); }
  .pred-history-money {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px;
    min-width: 72px; text-align: right;
  }
  .pred-history-money.up   { color: var(--green); }
  .pred-history-money.down { color: var(--red); }
  .pred-history-money.even { color: var(--muted); }

  /* PLAYOFFS PANEL · INTERACTIVE BRACKET */

  /* Bracket controls */
  .bracket-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .bkt-ctrl-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 700;
  }
  .bkt-ctrl-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .bkt-ctrl-btn.danger { border-color: rgba(255,51,85,0.35); color: var(--red); }
  .bkt-ctrl-btn.danger:hover { background: rgba(255,51,85,0.12); }
  .bkt-ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .bracket-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: var(--muted);
    margin-left: auto;
  }

  /* Play-In section ABOVE bracket */
  .playin-above {
    margin-bottom: 28px;
  }
  .playin-section {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
  }
  @media (max-width: 900px) { .playin-section { flex-direction: column; } }
  .playin-conf {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .playin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--accent2);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .playin-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(255,77,0,0.12);
    border: 1px solid rgba(255,77,0,0.25);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .playin-game-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 10px 0 4px;
  }
  .playin-game-label:first-of-type { margin-top: 0; }
  .playin-matchup {
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    margin-bottom: 8px;
    transition: box-shadow 0.2s;
  }
  .playin-matchup:hover { box-shadow: 0 0 10px rgba(255,170,0,0.12); }
  .pi-team-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: var(--surface2);
    border: none;
    color: var(--text);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    transition: background 0.15s;
    text-align: left;
  }
  .pi-team-btn + .pi-team-btn { border-left: 1px solid var(--border); }
  .pi-team-btn:hover { background: rgba(255,170,0,0.1); }
  .pi-team-btn.winner { background: rgba(255,170,0,0.15); }
  .pi-team-btn.winner .pi-name { color: var(--accent2); }
  .pi-team-btn.loser { opacity: 0.4; }
  .pi-logo-badge {
    width: 32px; height: 24px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 2px 3px;
  }
  .pi-logo { width: 100%; height: 100%; object-fit: contain; }
  .pi-seed {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; color: var(--muted);
    width: 16px; text-align: center; flex-shrink: 0;
  }
  .pi-name { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pi-record { color: var(--muted); font-size: 0.8rem; flex-shrink: 0; }
  .playin-result-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin: 6px 0 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .playin-result-label.visible { opacity: 1; }

  /* BRACKET TREE */
  .bracket-tree {
    display: flex;
    align-items: stretch;
    justify-content: center;
    min-height: 660px;
    padding: 10px 0 20px;
    overflow-x: auto;
    transform: scale(1.08);
    transform-origin: top center;
    margin-bottom: 40px;
  }
  .bracket-half {
    display: flex;
    align-items: stretch;
  }
  .bracket-half.east { flex-direction: row-reverse; }
  .bkt-round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
  }
  .bkt-matchup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    min-width: 172px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .bkt-matchup.clickable { cursor: pointer; }
  .bkt-matchup.clickable:hover { border-color: rgba(255,170,0,0.5); box-shadow: 0 0 12px rgba(255,170,0,0.12); }
  .bkt-matchup.pending {
    border-color: rgba(255,170,0,0.35);
    border-style: dashed;
  }
  .bkt-team-row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    transition: background 0.15s;
    cursor: inherit;
  }
  .bkt-team-row + .bkt-team-row { border-top: 1px solid var(--border); }
  .bkt-team-row:hover { background: rgba(255,255,255,0.04); }
  .bkt-team-row.winner-row { background: rgba(255,170,0,0.1); }
  .bkt-team-row.loser-row { opacity: 0.38; }
  .bkt-seed {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .bkt-logo-badge {
    width: 38px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    padding: 3px 4px;
  }
  .bkt-logo-badge img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .bkt-logo {
    width: 26px;
    height: 26px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .bkt-name {
    font-weight: 700;
    font-size: 0.88rem;
    flex: 1;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .bkt-record {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .bkt-tbd {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }
  .bkt-conn-col {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    width: 24px;
    min-width: 24px;
  }
  .bkt-conn {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .conn-top, .conn-bot { flex: 1; }
  .west .conn-top { border-right: 2px solid var(--border); border-bottom: 2px solid var(--border); }
  .west .conn-bot { border-right: 2px solid var(--border); border-top: 2px solid var(--border); }
  .east .conn-top { border-left: 2px solid var(--border); border-bottom: 2px solid var(--border); }
  .east .conn-bot { border-left: 2px solid var(--border); border-top: 2px solid var(--border); }
  .bracket-finals-col {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
  }
  .bkt-finals {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    color: var(--accent2);
    padding: 18px 14px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(255,77,0,0.1), rgba(255,170,0,0.05));
    line-height: 1.3;
    min-width: 80px;
    transition: all 0.4s;
  }
  .bkt-finals.has-teams {
    border-color: var(--accent2);
    background: linear-gradient(135deg, rgba(255,170,0,0.15), rgba(255,77,0,0.08));
  }
  .bkt-finals .finals-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 4px;
  }
  .bkt-finals .finals-team {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 1px;
    color: var(--text);
    margin-top: 3px;
    animation: fadeIn 0.4s ease;
  }
  .bkt-matchup.empty-slot {
    border-style: dashed;
    border-color: var(--border);
    opacity: 0.6;
  }
  .bkt-matchup.empty-slot .bkt-team-row {
    justify-content: center;
  }
  .bkt-round-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 6px;
  }
  .bracket-conf-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 18px;
  }
  .bracket-conf-label.west-label { color: var(--accent); }
  .bracket-conf-label.east-label { color: var(--blue); }

  /* CHAMPION CELEBRATION */
  #champion-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #champion-overlay.visible { opacity: 1; pointer-events: auto; }
  .champ-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
  }
  .champ-card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 48px 56px;
    border-radius: 16px;
    border: 2px solid var(--accent2);
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
    max-width: 480px;
    width: 90%;
    animation: champPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes champPop {
    0% { transform: scale(0.5) translateY(60px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .champ-trophy { font-size: 5rem; animation: trophySpin 1s ease forwards; margin-bottom: 8px; }
  @keyframes trophySpin {
    0% { transform: rotate(-20deg) scale(0.5); }
    60% { transform: rotate(10deg) scale(1.15); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .champ-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .champ-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--accent2);
    margin-bottom: 12px;
  }
  .champ-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 16px;
  }
  .champ-logo-wrap {
    width: 100px; height: 80px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    padding: 8px;
    border: 2px solid var(--accent2);
  }
  .champ-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .champ-dismiss {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: var(--text);
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .champ-dismiss:hover { background: rgba(255,255,255,0.12); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #confetti-canvas.visible { opacity: 1; }
  /* Eliminated teams */
  .eliminated-section {
    display: flex;
    gap: 40px;
    margin-top: 8px;
  }
  @media (max-width: 900px) { .eliminated-section { flex-direction: column; } }
  .eliminated-conf {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }
  .eliminated-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .eliminated-team {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
  }
  .eliminated-team:last-child { border-bottom: none; }
  .eliminated-rank {
    color: var(--muted);
    font-size: 0.85rem;
    width: 24px;
    text-align: center;
  }
  .elim-logo {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }
  .eliminated-record {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .eliminated-gb {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    color: var(--red);
  }
  /* Tiebreaker note */
  .tiebreaker-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--muted);
  }
  .tiebreaker-note strong {
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }
  .tiebreaker-note ol {
    margin: 6px 0 0 18px;
    padding: 0;
  }
  .tiebreaker-note ol li { margin-bottom: 2px; }
  .bracket-team-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    width: 36px;
    text-align: center;
    padding: 3px 0;
    border-radius: 4px;
    color: #fff;
  }

  /* TRENDS PANEL */
  .trends-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }
  @media (max-width: 900px) { .trends-grid { grid-template-columns: 1fr; } }
  .trend-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .trend-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .trend-card-title .icon {
    font-size: 1rem;
    background: rgba(255,77,0,0.15);
    padding: 5px 8px;
    border-radius: 5px;
    border: 1px solid rgba(255,77,0,0.25);
  }
  .trend-list { list-style: none; }
  .trend-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.9rem;
  }
  .trend-list li:last-child { border-bottom: none; }
  .trend-team { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 600; }
  .trend-stat { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; }
  .stat-green { color: var(--green); }
  .stat-red { color: var(--red); }
  .stat-gold { color: var(--gold); }
  .stat-blue { color: var(--blue); }

  /* Rankings view toggle */
  .rankings-view-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }
  .rankings-view-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .view-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Group header for conference/division view */
  .rankings-group-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding: 10px 14px;
    margin: 16px 0 0;
    border-left: 3px solid var(--accent);
    background: rgba(255,77,0,0.06);
    border-radius: 0 4px 4px 0;
  }
  .rankings-group-header:first-child { margin-top: 0; }
  .rankings-group-header.east { border-left-color: var(--blue); background: rgba(51,153,255,0.06); }
  .rankings-group-header.west { border-left-color: var(--accent); }
  .rankings-group-header.div { border-left-color: var(--gold); background: rgba(201,168,76,0.06); font-size: 0.95rem; letter-spacing: 2px; }

  /* Score card upgrades · logo badges */
  .score-logo-badge {
    width: 44px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
    padding: 4px;
    flex-shrink: 0;
  }
  .score-logo-badge img { width: 100%; height: 100%; object-fit: contain; }
  .score-team-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    line-height: 1;
  }

  /* Notable results section in scores */
  .notables-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 8px;
  }
  .notables-item {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: flex-start;
  }
  .notables-item:last-child { border-bottom: none; padding-bottom: 0; }
  .notables-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .notables-desc {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .notables-note {
    font-size: 0.83rem;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  .loading-spinner {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-size: 0.9rem;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* P&L CHART */
  .pnl-chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 32px;
    margin-bottom: 32px;
  }
  .pnl-chart-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .pnl-chart-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .pnl-chart-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .pnl-chart-wrap {
    padding: 20px;
    height: 220px;
    position: relative;
  }

  /* AI ANALYSIS BOX */
  .ai-box {
    background: linear-gradient(135deg, rgba(255,77,0,0.08) 0%, rgba(255,170,0,0.05) 100%);
    border: 1px solid rgba(255,77,0,0.25);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 28px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #c8c8e0;
  }
  .ai-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    font-size: 0.85rem;
  }
  .mini-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ===================== DRAFT TAB ===================== */
  .draft-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 1000px) { .draft-layout { grid-template-columns: 1fr; } }

  /* Lottery odds table */
  .lottery-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lottery-card-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .lottery-card-header .lch-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .lottery-card-header .lch-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .lottery-table {
    width: 100%;
    border-collapse: collapse;
  }
  .lottery-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .lottery-table th:nth-child(1), .lottery-table th:nth-child(2) { text-align: left; }
  .lottery-table td {
    padding: 9px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem;
    text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .lottery-table td:nth-child(1) { text-align: center; color: var(--muted); font-size: 0.8rem; width: 28px; }
  .lottery-table td:nth-child(2) { text-align: left; }
  .lottery-table tr:hover td { background: var(--surface2); }
  .lot-odds-pill {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 2px 10px;
    border-radius: 4px;
  }
  .lot-odds-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 3px;
    overflow: hidden;
  }
  .lot-odds-bar-fill { height: 100%; border-radius: 2px; }

  /* Simulator */
  .sim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .sim-card-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .sim-controls {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .sim-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    transition: opacity 0.15s, transform 0.1s;
  }
  .sim-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .sim-btn.primary { background: var(--accent); color: #fff; }
  .sim-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .sim-count-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-left: auto;
    text-transform: uppercase;
  }
  .sim-results {
    padding: 14px 20px;
    min-height: 80px;
  }
  .sim-pick-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'Barlow Condensed', sans-serif;
    animation: fadeIn 0.4s ease;
  }

        .then(function(snap) {

  function _scheduleSharedSave(key, value) {

    set: async function(key, value, shared) {

      }
      await _load();
      _cache[key] = value;
      _scheduleSave(key, value);
      return { key: key, value: value };
    },
    delete: async function(key, shared) {
      if (shared) {
        await _loadShared();
        delete _sharedCache[key];

        _sharedSaveTimers[key] = setTimeout(function() {
          _sharedRef(key).delete().catch(function() {});
        }, 500);

      }
      await _load();
      delete _cache[key];
      _scheduleDelete(key);
      return { key: key, deleted: true };
    },
    list: async function(prefix, shared) {
      if (shared) {
        await _loadShared();
        var keys = Object.keys(_sharedCache).filter(function(k) { return !prefix || k.startsWith(prefix); });
        return { keys: keys, prefix: prefix };
      }
      await _load();
      var keys = Object.keys(_cache).filter(function(k) { return !prefix || k.startsWith(prefix); });

    }

// Primary: ESPN standings (pts/ptsAllowed) + core stats (avgEstimatedPossessions)
// This matches NBA.com's pace-adjusted oRTG/dRTG within ~0.1 points.
async function fetchESPNRatings() {
  const teamIds = Object.keys(ESPN_ID_TO_ABBR).map(Number);

  // Step 1: standings → avgPointsFor + avgPointsAgainst per team (single call)
  const ptsByAbbr = {};
  try {
    const stRes = await fetch('https://site.web.api.espn.com/apis/v2/sports/basketball/nba/standings?season=2025&seasontype=2');
    if (stRes.ok) {
      const stJson = await stRes.json();
      (stJson.entries || []).forEach(function(e) {
        const abbr = normAbbr(e.team?.abbreviation || '');
        if (!abbr) return;
        const stats = {};
        (e.stats || []).forEach(function(s) { stats[s.name] = s.value; });
        const ptsFor     = parseFloat(stats['avgPointsFor']     || 0);
        const ptsAgainst = parseFloat(stats['avgPointsAgainst'] || 0);
        if (ptsFor > 0) ptsByAbbr[abbr] = { ptsFor, ptsAgainst };
      });
    }
  } catch(e) {}

  // Step 2: ESPN core stats → avgEstimatedPossessions (bilateral pace, matches NBA.com)
  // Falls back to Oliver formula from the site stats API if core stats unavailable.
  const CORE_BASE  = 'https://sports.core.api.espn.com/v2/sports/basketball/leagues/nba/seasons/2026/types/2/teams/';
  const SITE_BASE  = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/';

  const results = await Promise.all(teamIds.map(async function(id) {
    try {
      const [coreRes, siteRes] = await Promise.all([
        fetch(CORE_BASE + id + '/statistics'),
        fetch(SITE_BASE + id + '/statistics')
      ]);
      const coreJson = coreRes.ok ? await coreRes.json() : null;
      const siteJson = siteRes.ok ? await siteRes.json() : null;
      return { id, coreJson, siteJson };
    } catch(e) { return null; }
  }));

  let parsed = 0;
  results.forEach(function(r) {
    if (!r) return;
    const abbr = ESPN_ID_TO_ABBR[r.id];
    if (!abbr) return;

    // Extract avgEstimatedPossessions from core stats (bilateral pace = NBA.com method)
    let avgEstPoss = null;
    if (r.coreJson) {
      const coreCats = r.coreJson.splits?.categories || r.coreJson.categories || [];
      coreCats.forEach(function(cat) {
        (cat.stats || []).forEach(function(s) {
          if (s.name === 'avgEstimatedPossessions') avgEstPoss = parseFloat(s.value);
        });
      });
    }

    // Fall back: Oliver formula from site stats API
    if (!avgEstPoss && r.siteJson) {
      const siteCats = r.siteJson.splits?.categories || [];
      const statMap = {};
      siteCats.forEach(function(cat) {
        (cat.stats || []).forEach(function(s) { statMap[s.name] = parseFloat(s.value); });
      });
      const fga  = statMap['avgFieldGoalsAttempted'] || 0;
      const oreb = statMap['avgOffensiveRebounds']   || 0;
      const tov  = statMap['avgTurnovers']           || 0;
      const fta  = statMap['avgFreeThrowsAttempted'] || 0;
      if (fga && fta) avgEstPoss = fga - oreb + tov + (0.44 * fta);
    }

    if (!avgEstPoss || avgEstPoss <= 0) return;

    const ptsFor     = ptsByAbbr[abbr]?.ptsFor     || 0;
    const ptsAgainst = ptsByAbbr[abbr]?.ptsAgainst || 0;
    if (!ptsFor || !ptsAgainst) return;

    const oRTG   = Math.round((100 * ptsFor     / avgEstPoss) * 10) / 10;
    const dRTG   = Math.round((100 * ptsAgainst / avgEstPoss) * 10) / 10;
    const netRtg = Math.round((oRTG - dRTG) * 10) / 10;

    _NET_RATINGS[abbr] = { ortg: oRTG, drtg: dRTG, netRtg };
    parsed++;
  });

  return parsed;
}

// Secondary: scrape NBAstuffer via CORS proxy (pre-calculated values)
async function fetchNBAStufferRatings() {
  const target = 'https://www.nbastuffer.com/2025-2026-nba-team-stats/';
  const proxy  = 'https://api.allorigins.win/get?url=' + encodeURIComponent(target);
  const res    = await fetch(proxy);
  if (!res.ok) throw new Error('proxy ' + res.status);
  const json   = await res.json();
  const html   = json.contents || '';

  const rows = html.split('\n').filter(function(l) {
    return l.trim().startsWith('|') && l.includes('|') && !l.includes('---');
  });

  let parsed = 0;
  rows.forEach(function(row) {
    const cols = row.split('|').map(function(c){ return c.trim(); });
    if (cols.length < 14) return;
    const abbr  = _STUFFER_NAME_TO_ABBR[cols[2]];
    if (!abbr) return;
    const oEFF  = parseFloat(cols[10]);
    const dEFF  = parseFloat(cols[11]);
    const eDIFF = parseFloat(cols[12]);
    if (isNaN(oEFF) || isNaN(dEFF) || isNaN(eDIFF)) return;
    _NET_RATINGS[abbr] = {
      ortg:   Math.round(oEFF  * 10) / 10,
      drtg:   Math.round(dEFF  * 10) / 10,
      netRtg: Math.round(eDIFF * 10) / 10,
    };
    parsed++;
  });
  return parsed;
}

// Main entry point · tries ESPN first, falls back to NBAstuffer, then hardcoded.
// Re-renders rankings automatically when fresh data arrives.
async function fetchLiveNetRatings() {
  if (_netRatingsFetching) return;
  _netRatingsFetching = true;
  try {
    let parsed = 0;
    try {
      parsed = await fetchESPNRatings();
    } catch(e) { /* ESPN failed · try NBAstuffer */ }

    // NBAstuffer via allorigins.win proxy removed — proxy returns 522 and
    // triggers a CORS error in the console. ESPN is the only live source now;
    // hardcoded values in _NET_RATINGS are the fallback when ESPN fails.

    if (parsed >= 20) {
      // Recompute and re-render with fresh ratings
      ENRICHED_DATA.forEach(function(entry, i) {
        const s = STANDINGS_DATA[i];
        Object.assign(entry, s, computePowerScore(s), { streak: STREAK_DATA[s.abbr] || 0 });
      });
      renderRankings();
    }
  } finally {
    _netRatingsFetching = false;
  }
}

// ── RECENT RESULTS tracker ─────────────────────────────────────────────────
// Tracks new games from RECENT_GAMES not yet in L20_DATA.
// The live game engine appends to this as games finish.
function _buildRecentResults() {
  const results = {};
  STANDINGS_DATA.forEach(t => { results[t.abbr] = { recentWins: 0, recentLosses: 0, opponents: [] }; });
  RECENT_GAMES.forEach(g => {
    if (g.status !== 'final') return;
    const homeWon = g.homeScore > g.awayScore;
    if (results[g.home]) {
      homeWon ? results[g.home].recentWins++ : results[g.home].recentLosses++;
      results[g.home].opponents.push(g.away);
    }
    if (results[g.away]) {
      homeWon ? results[g.away].recentLosses++ : results[g.away].recentWins++;
      results[g.away].opponents.push(g.home);
    }
  });
  return results;
}
const _RECENT_RESULTS = _buildRecentResults();

// ── POWER SCORE ───────────────────────────────────────────────────────────────
function computePowerScore(team) {
  const gp = team.wins + team.losses;
  if (gp === 0) return { power: 0, winPct: 0, ortg: 0, drtg: 0, netRtg: 0,
                          l20WinPct: 0, oppL20WinPct: 0.5, normalizedNRTG: 0.5 };

  // 1. Season win%
  const winPct = team.wins / gp;

  // 2. L20 win% and Opp L20 win%
  //    Merge the hardcoded L20_DATA baseline with any new live games in
  //    _RECENT_RESULTS, sliding the 20-game window forward as games come in.
  const liveData = _RECENT_RESULTS[team.abbr] || { recentWins: 0, recentLosses: 0, opponents: [] };
  const baseL20  = L20_DATA[team.abbr];
  let l20WinPct, oppL20WinPct;

  if (baseL20) {
    const liveGP = liveData.recentWins + liveData.recentLosses;
    if (liveGP > 0) {
      // Slide the window: drop the oldest liveGP games from the baseline,
      // add the new live games.
      const dropGP = Math.min(liveGP, baseL20.l20g);
      const dropW  = Math.round((dropGP / baseL20.l20g) * baseL20.l20w);
      const newW   = baseL20.l20w - dropW + liveData.recentWins;
      const newG   = baseL20.l20g - dropGP + liveGP;
      l20WinPct = newG > 0 ? newW / newG : winPct;

      // Opponent win% for the new live games
      let liveOppSum = 0, liveOppCnt = 0;
      liveData.opponents.forEach(function(o) {
        const opp = STANDINGS_DATA.find(function(t) { return t.abbr === o; });
        if (opp && (opp.wins + opp.losses) > 0) {
          liveOppSum += opp.wins / (opp.wins + opp.losses);
          liveOppCnt++;
        }
      });
      const baseOppAvg = baseL20.oppCnt > 0 ? baseL20.oppSum / baseL20.oppCnt : 0.500;
      const keptOpp = Math.max(0, baseL20.oppCnt - dropGP);
      oppL20WinPct = (liveOppCnt + keptOpp) > 0
        ? (baseOppAvg * keptOpp + liveOppSum) / (liveOppCnt + keptOpp)
        : 0.500;
    } else {
      l20WinPct    = baseL20.l20g > 0 ? baseL20.l20w / baseL20.l20g : winPct;
      oppL20WinPct = baseL20.oppCnt > 0 ? baseL20.oppSum / baseL20.oppCnt : 0.500;
    }
  } else {
    // Team not in L20_DATA · use season win% as proxy
    l20WinPct    = winPct;
    oppL20WinPct = 0.500;
  }

  // 3. Net Rating · live from NBAstuffer fetch (or hardcoded fallback)
  const nrtgData = _NET_RATINGS[team.abbr];
  const ortg   = nrtgData ? nrtgData.ortg   : 110.0;
  const drtg   = nrtgData ? nrtgData.drtg   : 115.0;
  const netRtg = nrtgData ? nrtgData.netRtg : (ortg - drtg);

  // 4. Normalize: (netRtg + 15) / 30, clamped to [0, 1]
  const normalizedNRTG = Math.max(0, Math.min(1, (netRtg + 15) / 30));

  // 5. Final power score on 0–100 scale
  const power = (
    (winPct          * 0.25) +
    (l20WinPct       * 0.20) +
    (oppL20WinPct    * 0.15) +
    (normalizedNRTG  * 0.40)
  ) * 100;

  return {
    power:  Math.round(power * 10) / 10,
    winPct, ortg, drtg, netRtg,
    l20WinPct:    Math.round(l20WinPct    * 1000) / 1000,
    oppL20WinPct: Math.round(oppL20WinPct * 1000) / 1000,
    normalizedNRTG: Math.round(normalizedNRTG * 1000) / 1000,
  };
}

// STREAK DATA (positive = win streak, negative = loss streak)
// ============================================================
// Computed from RECENT_GAMES + extended history. Positive = W streak, negative = L streak.
// STREAK_DATA is derived directly from STANDINGS_DATA.streak so there is only
// one source of truth. Positive = win streak, negative = loss streak.
// The live game engine updates STREAK_DATA[abbr] in-place as games finish.
// fetchESPNStreaks() overwrites these with authoritative values from ESPN on every load/poll.
const STREAK_DATA = {};
STANDINGS_DATA.forEach(t => { STREAK_DATA[t.abbr] = t.streak || 0; });

// ── STREAK CALCULATION FROM SCOREBOARD ───────────────────────────────────────
// Fetches the last 15 days of game results from the proven ESPN scoreboard API
// (same endpoint/domain as the scores tab · zero CORS issues) and recomputes
// every team's current win/loss streak from scratch.
// This needs no hardcoded data and is always authoritative.
async function fetchESPNStreaks() {
  try {
    // Fetch last 40 days in parallel · covers any realistic NBA streak length
    // (longest in NBA history is 33 games; 40 days safely exceeds that)
    const dates = getDateRange(40, 0);
    const results = await Promise.all(dates.map(d => espnFetchDate(d)));

    // Flatten all final games, sort oldest → newest
    const allFinal = results
      .flatMap(r => r || [])
      .filter(g => g.isFinal)
      .sort((a, b) => a.date.localeCompare(b.date));

    if (allFinal.length === 0) return;

    // For each team, collect their results in chronological order
    const teamResults = {};   // abbr → [true=W, false=L, ...]  oldest first
    STANDINGS_DATA.forEach(t => { teamResults[t.abbr] = []; });

    allFinal.forEach(g => {
      const hw = g.homeScore > g.awayScore;
      if (teamResults[g.home] !== undefined) teamResults[g.home].push(hw);
      if (teamResults[g.away] !== undefined) teamResults[g.away].push(!hw);
    });

    // Compute streak: walk backwards from most recent result
    let updated = 0;
    Object.keys(teamResults).forEach(abbr => {
      const res = teamResults[abbr];
      if (res.length === 0) return;
      const last = res[res.length - 1];  // most recent result
      let streak = 0;
      for (let i = res.length - 1; i >= 0; i--) {
        if (res[i] === last) streak++;
        else break;
      }
      STREAK_DATA[abbr] = last ? streak : -streak;
      updated++;
    });

    if (updated >= 20) {
      const vals = Object.values(STREAK_DATA);
      _streakBest  = Math.max(...vals);
      _streakWorst = Math.min(...vals);
      ENRICHED_DATA.forEach(function(entry, i) {
        entry.streak = STREAK_DATA[STANDINGS_DATA[i].abbr] || 0;
      });
      renderRankings();
    }
  } catch(e) {
    // Scoreboard unavailable · STREAK_DATA values from STANDINGS_DATA remain
  }
}

// Identify best and worst streaks
// Mutable streak extremes · updated live whenever games finish
let _streakBest  = Math.max(...Object.values(STREAK_DATA));
let _streakWorst = Math.min(...Object.values(STREAK_DATA));

function getStreakClass(streak) {
  if (streak === _streakBest)  return 'streak-best';
  if (streak === _streakWorst) return 'streak-worst';
  const abs = Math.abs(streak);
  if (abs <= 1) return 'streak-grey';
  if (streak > 0) return abs >= 5 ? 'streak-w5' : 'streak-w' + abs;
  return abs >= 5 ? 'streak-l5' : 'streak-l' + abs;
}

function seedLastGameMap(games) {
  const sorted = [...games].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  sorted.forEach(g => {
    const isFinal = g.isFinal || g.status === 'final';
    if (!isFinal) return;
    _lastGameMap[g.home] = g;
    _lastGameMap[g.away] = g;
